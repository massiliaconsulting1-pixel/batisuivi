  let url;
  if(/iPhone|iPad|iPod/.test(ua)) url='maps://?daddr='+q;           // Plans (Apple)
  else if(/Android/.test(ua)) url='geo:0,0?q='+q;                    // app de cartes par défaut
  else url='https://www.google.com/maps/dir/?api=1&destination='+q;  // ordi : web
  try{ window.location.href=url; }catch(e){ window.open('https://www.google.com/maps/dir/?api=1&destination='+q,'_blank'); }
}

/* ============== rôles & permissions ============== */
function openRolesManager(){
  const roles=allRoles();
  let h=`<div class="grabber"></div><h2 style="margin-bottom:4px"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/></svg> Rôles & permissions</h2>
    <p class="note" style="margin-bottom:12px">Définis ce que chaque rôle a le droit de faire. Les rôles de base servent de modèle.</p>`;
  Object.keys(roles).forEach(k=>{
    const d=roles[k]; const p=rolePerms(k); const nb=PERMS.filter(([f])=>p[f]).length;
    h+=`<div class="card" style="padding:12px 14px;margin-bottom:8px"><div style="display:flex;align-items:center;gap:8px">
      <div style="flex:1"><b>${esc(d.label||k)}</b><div class="tag">Base : ${esc(({employe:'Ouvrier',chef:'Chef',boss:'Patron'})[niveauOf(k)])} · ${nb}/${PERMS.length} permissions</div></div>
      <button class="pen" onclick="editRole('${k}')"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></button>
      ${d.builtin?'':`<button class="iconbtn danger" onclick="delRole('${k}')"><svg class="x-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button>`}
    </div></div>`;
  });
  h+=`<button class="btn primary" style="width:100%;margin-top:10px" onclick="editRole('')">+ Ajouter un rôle</button>`;
  openModal(h);
}
function editRole(k){
  const isNew=!k; const d=isNew?{label:'',niveau:'employe'}:roleDef(k); const p=rolePerms(k||'__new__base_employe');
  const curPerms = isNew? rolePerms('employe') : rolePerms(k);
  const builtin = d.builtin;
  let h=`<div class="grabber"></div><h2 style="margin-bottom:10px">${isNew?'Nouveau rôle':'Modifier le rôle'}</h2>
    <label>Nom du rôle</label><input id="role_label" value="${esc(d.label||'')}" placeholder="ex: Apprenti, Conducteur de travaux" ${builtin?'':''}>
    <label style="margin-top:10px">Niveau de base (permissions par défaut)</label>
    <select id="role_niveau" onchange="roleApplyNiveau()">${NIVEAUX.map(([nv,lb])=>`<option value="${nv}" ${niveauOf(k||'')===nv||(isNew&&nv==='employe')?'selected':''}>${lb}</option>`).join('')}</select>
    <p class="note" style="margin:12px 0 6px">Permissions accordées :</p>
    <div id="role_perms">`;
  PERMS.forEach(([f,lb])=>{ h+=`<label class="perm-row"><input type="checkbox" class="perm-cb" data-f="${f}" ${curPerms[f]?'checked':''}><span>${esc(lb)}</span></label>`; });
  h+=`</div>
    <button class="btn primary" style="width:100%;margin-top:10px" onclick="saveRole('${k}',${isNew})">Enregistrer</button>`;
  openModal(h);
}
function roleApplyNiveau(){ const nv=document.getElementById('role_niveau').value; const base=NIVEAU_PERMS[nv]||{}; document.querySelectorAll('#role_perms .perm-cb').forEach(cb=>{ cb.checked=!!base[cb.getAttribute('data-f')]; }); }
function saveRole(k,isNew){
  const label=val('role_label'); if(!label){ toast("Donne un nom au rôle"); return; }
  const niveau=document.getElementById('role_niveau').value;
  const perms={}; document.querySelectorAll('#role_perms .perm-cb').forEach(cb=>{ perms[cb.getAttribute('data-f')]=cb.checked?1:0; });
  const key = k || ('role_'+Date.now().toString(36));
  if(!CONFIG_DB.roles) CONFIG_DB.roles={};
  CONFIG_DB.roles[key]={label,niveau,perms}; if(roleDef(key).builtin||BUILTIN_ROLES[key]) CONFIG_DB.roles[key].builtin=1;
  saveConfigDB(); closeModal(); toast("Rôle enregistré ✅"); if(SCREEN==='dev') renderDev(); else { render(); setTimeout(openRolesManager,80); }
}
function delRole(k){
  if(BUILTIN_ROLES[k]){ toast("Un rôle de base ne peut pas être supprimé"); return; }
  const used=Object.values(TEAM).some(m=>m.role===k);
  if(!confirm(used?"Des membres ont ce rôle : ils deviendront Ouvrier. Supprimer ?":"Supprimer ce rôle ?")) return;
  if(CONFIG_DB.roles) delete CONFIG_DB.roles[k]; saveConfigDB(); closeModal(); if(SCREEN==='dev') renderDev(); else { render(); setTimeout(openRolesManager,80); }
}

/* ============== modèles de chantier récurrents ============== */
function modeles(){ return (CONFIG_DB&&CONFIG_DB.modeles)||{}; }
function openModelesManager(){
  const m=modeles();
  let h=`<div class="grabber"></div><h2 style="margin-bottom:4px"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="8" y="3" width="8" height="4" rx="1"/><path d="M16 5h2a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2"/><path d="M9 12h6M9 16h6"/></svg> Modèles de chantier</h2>
    <p class="note" style="margin-bottom:12px">Crée des chantiers types (tâches + matériel pré-remplis) à réutiliser en un clic.</p>`;
  const keys=Object.keys(m);
  if(!keys.length) h+=`<p class="note" style="text-align:center;margin:10px 0">Aucun modèle pour l'instant.</p>`;
  keys.forEach(k=>{ const t=m[k]; h+=`<div class="card" style="padding:12px 14px;margin-bottom:8px"><div style="display:flex;align-items:center;gap:8px">
    <div style="flex:1"><b>${esc(t.nom||'Modèle')}</b><div class="tag">${(t.taches||[]).length} tâche(s) · ${(t.materiel||[]).length} matériel</div></div>
    <button class="pen" onclick="editModele('${k}')"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></button>
    <button class="iconbtn danger" onclick="delModele('${k}')"><svg class="x-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button>
  </div></div>`; });
  h+=`<button class="btn primary" style="width:100%;margin-top:10px" onclick="editModele('')">+ Nouveau modèle</button>`;
  openModal(h);
}
function editModele(k){
  const isNew=!k; const t=isNew?{nom:'',taches:[],materiel:[]}:(modeles()[k]||{nom:'',taches:[],materiel:[]});
  let h=`<div class="grabber"></div><h2 style="margin-bottom:10px">${isNew?'Nouveau modèle':'Modifier le modèle'}</h2>
    <label>Nom du modèle</label><input id="mod_nom" value="${esc(t.nom||'')}" placeholder="ex: Rénovation salle de bain">
    <label style="margin-top:10px">Tâches (une par ligne)</label>
    <textarea id="mod_taches" rows="5" placeholder="Dépose ancien carrelage&#10;Plomberie&#10;Pose faïence&#10;Joints et finitions">${esc((t.taches||[]).join('\n'))}</textarea>
    <label style="margin-top:10px">Matériel (un par ligne)</label>
    <textarea id="mod_materiel" rows="4" placeholder="Faïence&#10;Colle&#10;Receveur">${esc((t.materiel||[]).join('\n'))}</textarea>
    <button class="btn primary" style="width:100%;margin-top:10px" onclick="saveModele('${k}')">Enregistrer</button>`;
  openModal(h);
}
function linesOf(id){ const e=document.getElementById(id); return e?e.value.split('\n').map(s=>s.trim()).filter(Boolean):[]; }
function saveModele(k){
  const nom=val('mod_nom'); if(!nom){ toast("Donne un nom au modèle"); return; }
  const t={nom,taches:linesOf('mod_taches'),materiel:linesOf('mod_materiel')};
  const key=k||('mod_'+Date.now().toString(36));
  if(!CONFIG_DB.modeles) CONFIG_DB.modeles={};
  CONFIG_DB.modeles[key]=t; saveConfigDB(); closeModal(); toast("Modèle enregistré ✅"); if(SCREEN==='dev') renderDev(); else { render(); setTimeout(openModelesManager,80); }
}
function delModele(k){ if(!confirm("Supprimer ce modèle ?")) return; if(CONFIG_DB.modeles) delete CONFIG_DB.modeles[k]; saveConfigDB(); closeModal(); if(SCREEN==='dev') renderDev(); else { render(); setTimeout(openModelesManager,80); } }

/* ============== étapes d'avancement configurables ============== */
let _etapesDraft=null;
function openEtapesManager(){ _etapesDraft = ETAPES.map(n=>({name:n,orig:n})); renderEtapesManager(); }
function renderEtapesManager(){
  const x=`<svg class="x-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>`;
  let h=`<div class="grabber"></div><h2 style="margin-bottom:4px"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 3v18h18"/><path d="M7 16v-5M12 16V8M17 16v-3"/></svg> Étapes d'avancement</h2>
    <p class="note" style="margin-bottom:12px">Renomme, réordonne, ajoute ou supprime les étapes. L'ordre du haut vers le bas définit la progression (0% → 100%).</p>`;
  _etapesDraft.forEach((d,i)=>{
    h+=`<div class="card" style="padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:8px">
      <div style="display:flex;flex-direction:column;gap:2px;flex:none">
        <button class="pen" style="font-size:13px;padding:0 6px;${i===0?'opacity:.25':''}" onclick="moveEtape(${i},-1)">▲</button>
        <button class="pen" style="font-size:13px;padding:0 6px;${i===_etapesDraft.length-1?'opacity:.25':''}" onclick="moveEtape(${i},1)">▼</button>
      </div>
      <input id="et_${i}" value="${esc(d.name)}" style="flex:1" oninput="_etapesDraft[${i}].name=this.value" placeholder="Nom de l'étape">
      ${_etapesDraft.length>2?`<button class="iconbtn danger" onclick="delEtape(${i})">${x}</button>`:''}
    </div>`;
  });
  h+=`<button class="btn ghost" style="width:100%;margin-top:4px" onclick="addEtape()">+ Ajouter une étape</button>`;
  h+=`<button class="btn primary" style="width:100%;margin-top:10px" onclick="saveEtapes()">Enregistrer</button>`;
  openModal(h);
}
function _readEtapesDraft(){ _etapesDraft.forEach((d,i)=>{ const el=document.getElementById('et_'+i); if(el) d.name=el.value; }); }
function moveEtape(i,dir){ _readEtapesDraft(); const j=i+dir; if(j<0||j>=_etapesDraft.length) return; const t=_etapesDraft[i]; _etapesDraft[i]=_etapesDraft[j]; _etapesDraft[j]=t; renderEtapesManager(); }
function addEtape(){ _readEtapesDraft(); _etapesDraft.push({name:'Nouvelle étape',orig:null}); renderEtapesManager(); }
function delEtape(i){ _readEtapesDraft(); if(_etapesDraft.length<=2){ toast("Garde au moins 2 étapes"); return; } _etapesDraft.splice(i,1); renderEtapesManager(); }
function saveEtapes(){
  _readEtapesDraft();
  const list=_etapesDraft.map(d=>({name:(d.name||'').trim(),orig:d.orig})).filter(d=>d.name);
  const names=list.map(d=>d.name);
  if(names.length<2){ toast("Il faut au moins 2 étapes"); return; }
  if(new Set(names).size!==names.length){ toast("Deux étapes ne peuvent pas avoir le même nom"); return; }
  const renameMap={}; list.forEach(d=>{ if(d.orig && d.orig!==d.name) renameMap[d.orig]=d.name; });
  Object.keys(CHANTIERS).forEach(id=>{ const c=CHANTIERS[id]; let e=c.etape||ETAPES[0];
    if(renameMap[e]) e=renameMap[e];
    if(!names.includes(e)) e=names[0];
    if(e!==c.etape){ c.etape=e; saveChantier(id); } });
  CONFIG_DB.etapes=names; saveConfigDB(); syncEtapes(); closeModal(); toast("Étapes enregistrées ✅"); if(SCREEN==='dev') renderDev(); else render();
}
function applyModele(id,key){ const t=modeles()[key]; const c=CHANTIERS[id]; if(!t||!c) return;
  c.taches=c.taches||{}; (t.taches||[]).forEach(l=>{ c.taches[uid()]={label:l,done:false}; });
  c.materiel=c.materiel||{}; (t.materiel||[]).forEach(l=>{ c.materiel[uid()]={label:l,ok:false}; });
  saveChantier(id); }

/* ============== statistiques équipe ============== */
function openTeamStats(){
  const fmtH=ms=>{ const h=ms/3600000,hh=Math.floor(h),mm=Math.round((h-hh)*60); return mm?`${hh}h${String(mm).padStart(2,'0')}`:`${hh}h`; };
  const rows=Object.keys(TEAM).map(u=>{
    let ms=0,chs=0,frais=0;
    Object.values(CHANTIERS).forEach(c=>{ if(c.assignes&&c.assignes[u]&&!c.archived) chs++; if(c.pointages&&c.pointages[u]) ms+=totalHeures(c.pointages[u]); });
    const nf=NOTES_FRAIS[u]; if(nf) Object.values(nf).forEach(n=>frais+=(parseFloat(n.montant)||0));
    const cout=memberCout(u); const coutTot=cout>0?Math.round((ms/3600000)*cout):0;
    return {u,nom:(TEAM[u]||{}).nom||'?',role:TEAM[u].role,ms,chs,frais,cout,coutTot};
  }).sort((a,b)=>b.ms-a.ms);
  const totCout=rows.reduce((s,r)=>s+r.coutTot,0);
  let h=`<div class="grabber"></div><h2 style="margin-bottom:4px"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 3v18h18"/><path d="M7 16v-5M12 16V8M17 16v-3"/></svg> Statistiques équipe</h2>
    <p class="note" style="margin-bottom:12px">Heures pointées, chantiers actifs assignés, notes de frais et coût de la main d'œuvre par personne.</p>`;
  if(totCout>0){ h+=`<div class="kpis" style="margin-bottom:12px"><div class="kpi acc"><div class="big" style="font-size:22px">${eurFmt(totCout)}</div><div class="lbl">Coût main d'œuvre total</div></div></div>`; }
  rows.forEach(r=>{ h+=`<div class="card" style="padding:12px 14px;margin-bottom:8px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><b style="flex:1">${esc(r.nom)}</b><span class="pill">${esc(roleLabel(r.role))}</span></div>
    <div class="kpis" style="margin:0"><div class="kpi"><div class="big" style="font-size:18px">${fmtH(r.ms)}</div><div class="lbl">Heures</div></div>
      <div class="kpi"><div class="big" style="font-size:18px">${r.chs}</div><div class="lbl">Chantiers</div></div>
      <div class="kpi acc"><div class="big" style="font-size:18px">${r.cout>0?eurFmt(r.coutTot):'—'}</div><div class="lbl">Coût${r.cout>0?` (${r.cout}€/h)`:''}</div></div>
      <div class="kpi"><div class="big" style="font-size:18px">${eurFmt(r.frais)}</div><div class="lbl">Notes de frais</div></div></div>
  </div>`; });
  h+=`<p class="note" style="margin-top:8px;font-size:11px">Le coût = heures pointées × coût horaire (à définir dans la fiche de chaque membre). Le pointage s'active dans le menu <svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6h18M3 12h18M3 18h18"/></svg>.</p>`;
  openModal(h);
}

/* ============== bannière "ajouter à l'écran d'accueil" ============== */
function isStandalone(){ return (window.navigator.standalone===true) || (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches); }
function maybeInstall(){
  try{
    if(isStandalone()) return;
    if(lsGet('batisuivi_install_dismissed',false)) return;
    const ua=navigator.userAgent||''; const iOS=/iPhone|iPad|iPod/.test(ua); const And=/Android/.test(ua);
    if(!iOS && !And) return;
    if(document.getElementById('installBanner')) return;
    const steps = `<div class="plat"><b>iPhone</b> : Partager → « Sur l'écran d'accueil » → Ajouter</div>
      <div class="plat"><b>Android</b> : Menu ⋮ → « Ajouter à l'écran d'accueil »</div>`;
    const el=document.createElement('div'); el.id='installBanner'; el.className='install-banner';
    el.innerHTML=`<button class="ib-close" onclick="dismissInstall()"><svg class="x-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button>
      <div class="ib-row"><div class="ib-logo">${logoHTML()}</div>
        <div class="ib-txt"><b>Ajouter ${esc(coName())} à l'écran d'accueil</b>
        <div class="ib-steps">${steps}</div></div></div>
      <button class="btn primary ib-ok" onclick="dismissInstall()">J'ai compris 👍</button>`;
    document.body.appendChild(el); requestAnimationFrame(()=>el.classList.add('show'));
  }catch(e){}
}
function dismissInstall(){ lsSet('batisuivi_install_dismissed',true); const el=document.getElementById('installBanner'); if(el){ el.classList.remove('show'); setTimeout(()=>el.remove(),300); } }

/* ============== GO ============== */
boot();
setTimeout(maybeInstall,1500);
function modalOpen(){ const m=document.getElementById('modal'); return !!(m && !m.classList.contains('hidden')); }
function goBack(){
  if(modalOpen()){ closeModal(); return; }
  if(BOSS_PREVIEW){ clientLogout(); return; }
  if(EMP_PREVIEW){ exitEmployeePreview(); return; }
  if(SCREEN==='team'){
    if(CUR_CHANTIER){ closeChantier(); return; }
    if(TAB==='messagerie' && CHAT_OPEN){ closeConv(); return; }
    if(ARCH_VIEW){ closeArchived(); return; }
    if(CLIENTS_VIEW){ closeClients(); return; }
    if(!ME){ backToEntry(); return; }
    if(DEV_ACCESS){ backToDev(); return; }
    return;
  }
  if(SCREEN==='client'){ if(!CLIENT){ backToEntry(); return; } if(DEV_ACCESS){ backToDev(); return; } return; }
  if(SCREEN==='dev'){ backToEntry(); return; }
}
let _edge=null;
document.addEventListener('touchstart',e=>{ if(e.touches&&e.touches.length===1){ const t=e.touches[0]; _edge=(t.clientX<=28)?{x:t.clientX,y:t.clientY,t:Date.now()}:null; } else _edge=null; },{passive:true});
document.addEventListener('touchend',e=>{ if(!_edge) return; const t=(e.changedTouches&&e.changedTouches[0])||{}; const dx=(t.clientX||0)-_edge.x, dy=Math.abs((t.clientY||0)-_edge.y), dt=Date.now()-_edge.t; _edge=null; if(dx>60 && dy<55 && dt<700) goBack(); },{passive:true});
</script>
