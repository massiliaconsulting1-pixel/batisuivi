/* sous-variantes : blanc OU noir(ardoise) mélangés à une couleur d'accent (data-accent) — doit rester APRÈS les thèmes pour les surcharger */
body[data-accent="vert"]{ --acc:#2fd17a; --acc2:#56e09a; --accText:#042113; --glow:47,209,122; }

/* Peau premium : surfaces FIXES quel que soit le thème → le sélecteur ne change QUE l'accent.
   (Un vrai mode clair pourra être ajouté plus tard en neutralisant cette règle.) */
body[data-theme]{ --card:rgba(255,255,255,.055); --card2:rgba(255,255,255,.09);
  --line:rgba(255,255,255,.11); --txt:#EAF3F6; --shadow:0 18px 40px -18px rgba(0,0,0,.55); }
/* Mode clair — l'essentiel s'adapte via les variables ; petit ajustement pour les éléments qui utilisent l'accent comme texte */
body[data-mode="clair"] .pill.acc{ color:var(--acc); border-color:rgba(20,32,54,.16) }
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;color:var(--txt);font-family:'Manrope',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;overscroll-behavior-y:none}
html{background:#0A1220}
/* Fond premium « verre dépoli » — lueurs dérivées de l'accent (var(--glow)).
   Posé sur le body NON fixe : le body n'est pas composité, donc les lueurs se re-peignent
   correctement dès qu'on change de couleur (contrairement à background-attachment:fixed / position:fixed). */
body{min-height:100vh;background:
  radial-gradient(120% 90% at 100% 0%, rgba(var(--glow),.30) 0%, transparent 45%),
  radial-gradient(120% 90% at 0% 100%, rgba(var(--glow),.20) 0%, transparent 50%),
  linear-gradient(160deg,var(--bg) 0%,var(--bg2) 55%,var(--bg) 100%);
  background-repeat:no-repeat;background-color:var(--bg)}
.chat-full{background:transparent}
h1,h2,h3{font-family:'Sora',sans-serif;margin:0;letter-spacing:-.02em}
.wrap{max-width:560px;margin:0 auto;padding:0 16px 110px;position:relative;z-index:1;isolation:isolate;min-height:100vh}
button{font-family:inherit}
input,select,textarea{font-family:'Manrope',sans-serif}

/* ---- boutons ---- */
.btn{border:none;border-radius:12px;padding:13px 18px;font-weight:700;font-size:14.5px;letter-spacing:.01em;line-height:1;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .16s cubic-bezier(.2,.7,.2,1),box-shadow .2s ease,background .2s ease,border-color .2s ease,opacity .2s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn.primary{background:linear-gradient(135deg,var(--acc),var(--acc2));color:var(--accText);box-shadow:0 10px 26px -10px rgba(var(--glow),.6),inset 0 1px 0 rgba(255,255,255,.28)}
.btn.primary:hover{transform:translateY(-1px);box-shadow:0 14px 32px -10px rgba(var(--glow),.8),inset 0 1px 0 rgba(255,255,255,.35)}
.btn.primary:active{transform:translateY(1px) scale(.99);box-shadow:0 6px 16px -8px rgba(var(--glow),.55)}
.btn.ghost{background:var(--card2);color:var(--txt);border:1px solid var(--line);box-shadow:inset 0 1px 0 rgba(255,255,255,.05)}
.btn.ghost:hover{background:var(--card);border-color:rgba(var(--glow),.45)}
.btn.ghost:active{transform:translateY(1px) scale(.99)}
.btn.danger{background:rgba(255,77,98,.12);color:var(--danger);border:1px solid rgba(255,77,98,.35)}
.btn.danger:hover{background:rgba(255,77,98,.2);border-color:var(--danger)}
.btn.danger:active{transform:translateY(1px) scale(.99)}
.btn.ok{background:linear-gradient(135deg,#56e09a,var(--ok));color:#042113;box-shadow:0 10px 26px -10px rgba(52,211,153,.55),inset 0 1px 0 rgba(255,255,255,.3)}
.btn:disabled{opacity:.45;pointer-events:none;box-shadow:none;transform:none}
.mini{font-size:12px;padding:8px 12px;border-radius:10px}
.linkbtn{background:var(--card2);border:1px solid var(--line);color:var(--acc2);font-weight:700;font-size:12.5px;cursor:pointer;padding:8px 13px;border-radius:10px;transition:.16s;display:inline-flex;align-items:center;justify-content:center;gap:5px;text-align:center}
.linkbtn:hover{border-color:rgba(var(--glow),.45)}
.linkbtn:active{transform:scale(.96)}
.backbtn{background:var(--card2);border:1px solid var(--line);color:var(--txt);font-weight:700;font-size:13px;cursor:pointer;padding:9px 15px;border-radius:12px;display:inline-flex;align-items:center;gap:6px;transition:.16s;margin-bottom:4px}
.backbtn:hover{border-color:rgba(var(--glow),.45)}
.backbtn:active{transform:scale(.97)}
.backbtn .ar{color:var(--acc2);font-size:15px;line-height:1}
.iconbtn{background:var(--card2);border:1px solid var(--line);color:var(--muted);width:32px;height:32px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;line-height:1;flex:none;transition:.16s;padding:0}
.iconbtn:hover{color:var(--txt);border-color:rgba(var(--glow),.45)}
.iconbtn .x-ic{width:15px;height:15px;display:block}
.iconbtn.danger .x-ic{width:17px;height:17px}
.iconbtn:active{transform:scale(.92)}
.iconbtn.danger{color:#fff;background:var(--danger);border-color:var(--danger);font-weight:800}
.iconbtn.danger:hover{background:#e23a4f;border-color:#e23a4f}
.iconbtn.danger:active{background:#e23a4f;border-color:#e23a4f}
.iconbtn.edit{color:var(--acc2);font-size:17px}

/* ---- cartes ---- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.07);backdrop-filter:blur(16px) saturate(140%);-webkit-backdrop-filter:blur(16px) saturate(140%)}
@supports not ((backdrop-filter:blur(2px)) or (-webkit-backdrop-filter:blur(2px))){ .card,.top,.nav{ background:rgba(18,30,46,.9) } }
.card.flat{box-shadow:none}
label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin:12px 0 5px}
input,select,textarea{width:100%;background:var(--bg2);border:1px solid var(--line);color:var(--txt);border-radius:11px;padding:12px;font-size:15px;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--acc)}
textarea{resize:vertical;min-height:64px}
.note{color:var(--muted);font-size:12.5px;line-height:1.5}
.tag{font-size:11px;color:var(--muted)}
.pill{display:inline-flex;align-items:center;justify-content:center;text-align:center;gap:5px;font-size:11px;font-weight:700;padding:4px 9px;border-radius:999px;background:var(--card2);border:1px solid var(--line);line-height:1.2}
.pill.ok{color:var(--ok);border-color:rgba(47,209,122,.4)}
.pill.warn{color:var(--warn);border-color:rgba(255,176,32,.4)}
.pill.acc{color:var(--acc2);border-color:rgba(var(--glow),.45)}
body[data-theme="blanc"]:not([data-accent]) .pill.acc{color:#64748b;border-color:#cbd5e1}
.pen{background:none;border:none;cursor:pointer;color:var(--acc2);font-size:18px;line-height:1;padding:4px 8px;flex:none;transition:.15s}
.pen:active{transform:scale(.9)}
.chantier .ch-top>div:first-child{flex:1;min-width:0}
.chantier .ch-top>.pill{flex:none;align-self:flex-start;white-space:nowrap;margin-left:6px}
.pill.danger{color:var(--danger);border-color:rgba(255,77,98,.4)}

/* ---- en-tête ---- */
.top{position:sticky;top:0;z-index:50;
  background:var(--card);backdrop-filter:blur(16px) saturate(140%);-webkit-backdrop-filter:blur(16px) saturate(140%);box-shadow:inset 0 1px 0 rgba(255,255,255,.07);
  transform:translateZ(0);-webkit-transform:translateZ(0);will-change:transform;-webkit-backface-visibility:hidden;backface-visibility:hidden;
  border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;
  padding:calc(48px + env(safe-area-inset-top)) calc(16px + env(safe-area-inset-right)) 12px calc(16px + env(safe-area-inset-left));
  margin:0 calc(-16px - env(safe-area-inset-left)) 12px calc(-16px - env(safe-area-inset-right))}
.brand{display:flex;align-items:center;gap:10px;min-width:0}
.brand .logo{width:36px;height:36px;border-radius:10px;flex:none;display:grid;place-items:center;font-size:20px;
  background:linear-gradient(135deg,var(--acc2),var(--acc));color:var(--accText);overflow:hidden}
.brand .logo img{width:100%;height:100%;object-fit:contain;background:#fff}
.brand .bn{min-width:0}
.brand .bn b{display:block;font-family:'Sora';font-size:16px;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand .bn small{font-size:10.5px;color:var(--muted)}
.top .role-chip{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:5px 9px;border-radius:8px;background:var(--card2);border:1px solid var(--line);color:var(--acc2)}
.burger{width:40px;height:40px;border-radius:11px;background:var(--card2);border:1px solid var(--line);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;flex:none}
.burger span{display:block;width:18px;height:2px;border-radius:2px;background:var(--txt)}
.burger:active{transform:scale(.94)}
.menu-badge{position:relative}
.menu-row{display:flex;align-items:center;gap:12px;padding:14px 4px;border-bottom:1px solid var(--line);cursor:pointer}
.menu-row:last-child{border-bottom:none}
.menu-row .mi{font-size:20px;width:26px;text-align:center;flex:none}
.note-badge{background:var(--danger);color:#fff;font-size:12px;font-weight:800;min-width:22px;height:22px;border-radius:11px;display:grid;place-items:center;padding:0 6px;flex:none}
.plan-nav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
.plan-nav .iconbtn{font-size:22px;width:42px;height:42px}
.day-row{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;margin-bottom:14px}
.day-chip{position:relative;flex:none;min-width:50px;padding:9px 0;border-radius:15px;background:var(--card2);border:1px solid var(--line);color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.day-chip .dn{font-size:11px;font-weight:600;text-transform:uppercase}
.day-chip .dd{font-size:18px;font-weight:800;font-family:'Sora'}
.day-chip.today{border-color:var(--acc)}
.day-chip.on{background:linear-gradient(180deg,var(--acc2),var(--acc));border-color:var(--acc);color:var(--accText)}
.day-chip .ddot{position:absolute;top:6px;right:8px;width:6px;height:6px;border-radius:50%;background:var(--acc)}
.day-chip.on .ddot{background:var(--accText)}
.pday{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px;margin-bottom:9px;cursor:pointer;transition:.12s}
.pday:active{transform:scale(.99)}
.pday.empty{border-style:dashed}
.pday.rest{opacity:.8}
.pday-content{margin-top:3px;font-size:13px}
.pday-content .pc-ch{font-weight:700}
.pday-content .pc-sub{font-size:12px;color:var(--muted);margin-top:1px}
.pday-rest{font-weight:700;color:var(--muted)}
.pday-edit{color:var(--acc2);font-size:16px;flex:none}
.pday-hours{margin-top:5px;font-size:11px;font-weight:700;color:var(--acc2)}

/* ---- nav bas ---- */
.nav{position:fixed;left:0;right:0;bottom:0;z-index:60;display:flex;justify-content:space-around;
  background:var(--card);backdrop-filter:blur(16px) saturate(140%);-webkit-backdrop-filter:blur(16px) saturate(140%);box-shadow:inset 0 1px 0 rgba(255,255,255,.07);
  transform:translateZ(0);-webkit-transform:translateZ(0);will-change:transform;-webkit-backface-visibility:hidden;backface-visibility:hidden;
  border-top:1px solid var(--line);padding:8px 6px calc(8px + env(safe-area-inset-bottom))}
.nav.hidden{display:none}
.nav button{background:none;border:none;color:var(--muted);font-size:10.5px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 10px;cursor:pointer;border-radius:10px;flex:1 1 0;min-width:0;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav button .ic{font-size:20px}
.nav button.on{color:var(--acc2)}
.nav.compact button{font-size:9px;padding:5px 4px;gap:3px}
.nav.compact button .ic{font-size:18px}

/* ---- écran d'accueil / auth ---- */
.center-wrap{min-height:100vh;display:flex;flex-direction:column;justify-content:center;
  padding:calc(56px + env(safe-area-inset-top)) 18px calc(28px + env(safe-area-inset-bottom));max-width:460px;margin:0 auto}
.hero-logo{width:78px;height:78px;border-radius:20px;margin:0 auto 16px;display:grid;place-items:center;font-size:40px;
  background:linear-gradient(135deg,var(--acc2),var(--acc));color:var(--accText);box-shadow:var(--shadow);overflow:hidden}
.hero-logo img{width:100%;height:100%;object-fit:contain;background:#fff}
.role-choice{display:grid;gap:12px;margin-top:8px}
.role-btn{text-align:left;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;cursor:pointer;display:flex;gap:14px;align-items:center;transition:.15s}
.role-btn:active{transform:scale(.99)}
.role-btn .ic{font-size:30px;flex:none}
.role-btn b{font-family:'Sora';font-size:17px;display:block}
.role-btn small{color:var(--muted);font-size:12.5px}
.role-btn .arr{margin-left:auto;color:var(--acc2);font-size:22px}
.subtabs{display:flex;gap:6px;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:4px;margin:10px 0}
.subtabs button{flex:1;background:none;border:none;color:var(--muted);font-weight:700;font-size:13px;padding:9px;border-radius:9px;cursor:pointer}
.subtabs button.on{background:var(--acc);color:var(--accText)}
.err{color:var(--danger);font-size:13px;font-weight:600;margin-top:10px;text-align:center;display:none;line-height:1.4}
.sep{display:flex;align-items:center;gap:10px;margin:16px 0 12px;color:var(--muted);font-size:12px}
.sep::before,.sep::after{content:"";flex:1;height:1px;background:var(--line)}
.btn-google{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;background:#fff;color:#3c4043;font-weight:700;font-size:14px;border:none;border-radius:12px;padding:13px;cursor:pointer}

/* ---- divers ---- */
.section-title{display:flex;align-items:center;justify-content:space-between;margin:18px 0 10px;min-height:38px}
.section-title h2{font-size:18px}
.empty{text-align:center;color:var(--muted);padding:30px 16px;font-size:14px}
.row{display:flex;gap:10px}.row>*{flex:1}
.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(20px);background:var(--card2);
  border:1px solid var(--line);color:var(--txt);padding:12px 18px;border-radius:12px;font-size:14px;font-weight:600;
  opacity:0;transition:.3s;z-index:300;box-shadow:var(--shadow);max-width:90%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.install-banner{position:fixed;left:12px;right:12px;bottom:calc(12px + env(safe-area-inset-bottom));z-index:300;
  background:rgba(15,25,42,.95);border:1px solid rgba(255,255,255,.14);border-radius:18px;box-shadow:0 24px 60px -18px rgba(0,0,0,.75);
  backdrop-filter:blur(22px) saturate(140%);-webkit-backdrop-filter:blur(22px) saturate(140%);
  padding:16px 16px 14px;max-width:480px;margin:0 auto;transform:translateY(140%);opacity:0;transition:.35s}
.install-banner .ib-steps ol{margin:4px 0 0;padding-left:20px}
.install-banner .ib-steps li{font-size:11.5px;line-height:1.4;color:var(--txt);margin:1px 0}
.install-banner .ib-steps .plat{font-size:11.5px;font-weight:600;color:var(--txt);margin-top:5px}
.install-banner.show{transform:translateY(0);opacity:1}
.install-banner .ib-row{display:flex;gap:13px;align-items:flex-start}
.install-banner .ib-logo{flex:none;width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-size:24px;background:linear-gradient(135deg,var(--acc2),var(--acc));overflow:hidden}
.install-banner .ib-logo img{width:100%;height:100%;object-fit:cover}
.install-banner .ib-txt b{font-size:15px;display:block}
.install-banner .ib-txt p{margin:4px 0 0;font-size:12.5px;color:var(--muted);line-height:1.45}
.install-banner .ib-steps{color:var(--txt)!important;margin-top:7px!important}
.install-banner .ib-close{position:absolute;top:10px;right:12px;background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;font-weight:800;padding:4px}
.install-banner .ib-ok{width:100%;margin-top:10px;padding:9px}
.modal{position:fixed;inset:0;z-index:200;background:rgba(4,8,16,.6);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center}
.modal.hidden{display:none}
.modal-card{background:var(--card);border:1px solid var(--line);border-radius:22px 22px 0 0;width:100%;max-width:560px;
  padding:20px 18px calc(24px + env(safe-area-inset-bottom));max-height:90vh;overflow:auto}
.grabber{width:46px;height:5px;border-radius:3px;background:var(--line);margin:0 auto 14px;cursor:grab}

/* chantier card */
.chantier{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:15px;margin-bottom:11px;cursor:pointer;transition:.15s}
.ch-more{position:absolute;top:10px;right:10px;z-index:2;width:32px;height:32px;border-radius:10px;background:var(--card2);border:1px solid var(--line);color:var(--muted);font-size:20px;font-weight:800;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
.chantier .ch-top{padding-right:38px}
.swipe-wrap{position:relative;overflow:hidden;border-radius:var(--r);margin-bottom:11px}
.swipe-wrap .chantier{margin-bottom:0;transition:transform .2s ease;will-change:transform}
.swipe-actions{position:absolute;right:0;top:5px;bottom:5px;width:168px;display:flex;border-radius:0 var(--r) var(--r) 0;overflow:hidden}
.swipe-arch,.swipe-del{flex:1;border:none;color:#fff;font-weight:800;font-size:12px;line-height:1.25;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.swipe-arch{background:#d98a2b}
.swipe-del{background:var(--danger)}
.ch-tools{margin-bottom:12px}
.ch-search{width:100%;margin-bottom:10px}
.chip-row{display:flex;gap:7px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.chip{flex:none;font-size:12px;font-weight:600;padding:7px 13px;border-radius:20px;background:var(--card2);border:1px solid var(--line);color:var(--muted);cursor:pointer;white-space:nowrap}
.chip.on{background:var(--acc);border-color:var(--acc);color:var(--accText)}
.pill.late{background:rgba(255,90,90,.16);color:#ff8a8a;border:none;font-size:10px;margin-left:4px;vertical-align:middle}
.pill.msg{background:rgba(61,139,255,.18);color:var(--acc2);border:none;font-size:10px;margin-left:4px;vertical-align:middle}
.nav-badge{position:absolute;top:-6px;right:-12px;background:var(--danger);color:#fff;font-size:10px;font-weight:800;min-width:16px;height:16px;border-radius:8px;display:grid;place-items:center;padding:0 3px;border:1.5px solid var(--bg2);line-height:1}
.nav-badge.green{right:auto;left:-12px;background:var(--ok);color:#06210f}
body.big-text{zoom:1.18}
@supports not (zoom:1){ body.big-text{font-size:118%} }
.pill.adv{background:rgba(47,209,122,.18);color:var(--ok);border:none;font-size:10px;margin-left:4px;vertical-align:middle}
.pill.relance{background:rgba(255,176,32,.18);color:var(--warn);border:none;font-size:10px;vertical-align:middle}
.nav-badge.amber{background:var(--warn);color:#3a2700}
.ib{display:inline-grid;place-items:center;min-width:18px;height:18px;padding:0 5px;margin-left:6px;border-radius:9px;background:var(--danger);color:#fff;font-size:11px;font-weight:800;line-height:1;vertical-align:middle}
.perm-row{display:flex;align-items:center;gap:10px;padding:9px 2px;border-bottom:1px solid var(--line);cursor:pointer;font-size:14px}
.perm-row:last-child{border-bottom:none}
.perm-row input{width:20px;height:20px;flex:none;accent-color:var(--acc)}
.perm-row span{flex:1}
.bars{display:flex;align-items:flex-end;gap:8px;height:150px;padding-top:18px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.bar{width:100%;max-width:34px;min-height:3px;background:linear-gradient(180deg,var(--acc2),var(--acc));border-radius:6px 6px 0 0;transition:height .4s ease}
.bar-lbl{font-size:10px;color:var(--muted);margin-top:6px}
.bar-val{font-size:9px;color:var(--muted);margin-bottom:3px;white-space:nowrap;font-weight:700}
.acc{background:var(--card);border:1px solid var(--line);border-radius:var(--r);margin-bottom:14px;overflow:hidden}
.acc>summary{list-style:none;cursor:pointer;padding:16px;font-family:'Sora';font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:space-between}
.acc>summary::-webkit-details-marker{display:none}
.acc>summary::after{content:'⌄';font-size:20px;line-height:1;color:var(--muted);transition:transform .2s}
.acc[open]>summary::after{transform:rotate(180deg)}
.acc-body{padding:0 16px 16px}
.help-step{display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--line)}
.help-step:last-of-type{border-bottom:none}
.help-ic{font-size:22px;width:30px;text-align:center;flex:none}
.contact-row{display:flex;align-items:center;gap:14px;padding:13px;background:var(--card2);border:1px solid var(--line);border-radius:14px;margin-bottom:9px;text-decoration:none;color:var(--txt)}
.contact-row .ci{font-size:22px;flex:none}
.contact-row .tag{margin-bottom:1px}
.chantier:active{transform:scale(.995)}
.chantier .ch-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.chantier h3{font-size:16px}
.chantier .ch-client{font-size:12.5px;color:var(--muted);margin-top:2px}
.progress{height:8px;border-radius:6px;background:var(--bg2);overflow:hidden;margin-top:11px}
.progress span{display:block;height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:6px;transition:width .5s}
.steps{display:flex;gap:4px;margin-top:12px}
.step-dot{flex:1;height:5px;border-radius:3px;background:var(--bg2)}
.step-dot.done{background:var(--acc)}
.ch-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:11px}
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px}
.kpi .big{font-family:'Sora';font-size:26px;font-weight:800}
.kpi .lbl{font-size:11px;color:var(--muted);margin-top:2px}
.kpi.acc .big{color:var(--acc2)} .kpi.ok .big{color:var(--ok)} .kpi.warn .big{color:var(--warn)}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
.chat-list{margin-top:4px}
.chat-conv{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:14px;cursor:pointer;background:var(--card);border:1px solid var(--line);margin-bottom:8px}
.chat-conv .av{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;font-weight:800;color:#fff;flex:none;font-size:18px;overflow:hidden}
.chat-conv .av img{width:100%;height:100%;object-fit:cover}
.chat-conv .meta{flex:1;min-width:0}
.chat-conv .meta b{display:block;font-size:15px}
.chat-conv .meta .last{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-conv .cb{background:var(--danger);color:#fff;font-size:11px;font-weight:800;min-width:20px;height:20px;border-radius:10px;display:grid;place-items:center;padding:0 5px;flex:none}
.chat-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.chat-thread{display:flex;flex-direction:column;gap:7px;padding:6px 2px 14px;max-height:62vh;overflow-y:auto}
.cbub{max-width:80%;padding:8px 12px;border-radius:15px;font-size:14px;line-height:1.4;word-break:break-word}
.cbub .who{font-size:11px;font-weight:800;opacity:.75;margin-bottom:2px}
.cbub .tm{font-size:10px;opacity:.55;margin-top:3px;text-align:right}
.cbub.me{align-self:flex-end;background:var(--acc);color:var(--accText);border-bottom-right-radius:5px}
.cbub.them{align-self:flex-start;background:var(--card2);border:1px solid var(--line);border-bottom-left-radius:5px}
.chat-bar{position:sticky;bottom:0;display:flex;gap:8px;padding:10px 0;background:linear-gradient(to top,var(--bg) 72%,transparent)}
.chat-bar input{flex:1}
.chat-bar .iconbtn{width:42px;height:42px;font-size:18px;flex:none}
.chat-bar .iconbtn.rec{background:var(--danger);color:#fff;border-color:var(--danger);font-weight:800;font-size:12px;width:auto;padding:0 10px}
.cbub .cimg{display:block;width:100%;max-width:210px;border-radius:11px;margin:2px 0;cursor:pointer}
.cbub .caud{display:block;width:220px;max-width:100%;margin:3px 0;height:38px}
.cbub .adur{font-size:11px;opacity:.6;margin-top:1px}
.cbub .cdel{background:none;border:none;color:inherit;opacity:.55;font-size:10px;cursor:pointer;padding:0;text-decoration:underline;font-family:inherit}
.cbub .cdel:active{opacity:.9}
/* messagerie plein écran (façon WhatsApp) */
.chat-full{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;max-width:560px;margin:0 auto;
  background:radial-gradient(900px 500px at 80% -10%, rgba(var(--glow),.12), transparent 60%),radial-gradient(700px 400px at -10% 10%, rgba(var(--glow),.07), transparent 55%),var(--bg)}
.chat-full .chat-head{flex:none;margin:0;padding:14px 16px 10px;padding-top:calc(14px + env(safe-area-inset-top));border-bottom:1px solid var(--line)}
.chat-full .chat-thread{flex:1;min-height:0;max-height:none;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px}
.chat-full .chat-bar{flex:none;position:static;background:transparent;padding:10px 16px calc(12px + env(safe-area-inset-bottom));border-top:1px solid var(--line)}
.lic{display:inline-block;vertical-align:-0.18em;flex:none}
.cbub .cbub-act{display:flex;gap:8px;margin-top:5px;justify-content:flex-end}
.cbub .cbub-act button{background:rgba(255,255,255,.18);border:none;color:inherit;border-radius:7px;padding:2px 8px;font-size:12px;cursor:pointer}
.cbub.them .cbub-act button{background:var(--bg2)}
.photo-grid .ph{aspect-ratio:1;border-radius:10px;background:var(--bg2) center/cover;border:1px solid var(--line);position:relative;cursor:pointer}
.ph .ph-like{position:absolute;bottom:5px;right:5px;background:rgba(255,255,255,.92);border-radius:50%;width:24px;height:24px;display:grid;place-items:center;font-size:13px;box-shadow:0 2px 6px rgba(0,0,0,.3)}
.timeline-item{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}
.timeline-item:last-child{border-bottom:none}
.ti-dot{width:10px;height:10px;border-radius:50%;background:var(--acc);margin-top:5px;flex:none}
.code-display{font-family:'Sora';font-size:30px;font-weight:800;letter-spacing:6px;text-align:center;color:var(--acc2);
  background:var(--bg2);border:1px dashed var(--acc);border-radius:14px;padding:18px;margin:10px 0}
.task-row{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}
.task-row:last-child{border-bottom:none}
.checkbox{width:24px;height:24px;border-radius:7px;border:2px solid var(--line);flex:none;display:grid;place-items:center;cursor:pointer;font-size:14px}
.checkbox.on{background:var(--ok);border-color:var(--ok);color:#042113}
.task-row.done .tk-label{text-decoration:line-through;color:var(--muted)}
.member-row{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--line)}
.member-row:last-child{border-bottom:none}
.avatar{width:38px;height:38px;border-radius:11px;flex:none;display:grid;place-items:center;font-weight:800;font-family:'Sora';color:var(--accText);overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}
.fab{position:fixed;right:18px;bottom:calc(82px + env(safe-area-inset-bottom));z-index:55;width:56px;height:56px;border-radius:18px;
  background:linear-gradient(180deg,var(--acc2),var(--acc));color:var(--accText);border:none;cursor:pointer;box-shadow:0 12px 30px -8px rgba(var(--glow),.55);
  display:grid;place-items:center;padding:0}
.fab svg{display:block}
.warn-btn{position:relative;background:var(--card2);border:1px solid var(--line);width:42px;height:42px;border-radius:13px;cursor:pointer;flex:none;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:.15s;padding:0}
.warn-btn.has{color:var(--warn);border-color:rgba(255,176,32,.45);background:rgba(255,176,32,.10)}
.warn-btn:active{transform:scale(.94)}
.warn-btn svg{width:22px;height:22px;display:block;transform:translateY(-1px)}
.warn-btn .badge{position:absolute;top:-7px;right:-7px;background:var(--danger);color:#fff;font-size:11px;font-weight:800;min-width:19px;height:19px;border-radius:10px;display:grid;place-items:center;padding:0 4px;border:2px solid var(--bg);line-height:1}
/* en-tête de page unifié (même niveau sur tous les onglets) */
.page-head{display:flex;align-items:center;justify-content:space-between;height:44px;margin:8px 0 14px;flex:none}
.page-head h2{font-size:20px}
/* message supprimé (visible boss uniquement) */
.msg-deleted{opacity:.55}
.msg-deleted .tk-label,.msg-deleted div{color:var(--muted)!important;font-style:italic}
/* avatar profil + cadrage (style CDM 26) */
.prof-avatar{width:64px;height:64px;border-radius:18px;overflow:hidden;display:grid;place-items:center;font-family:'Sora';font-weight:800;font-size:24px;color:var(--accText);flex:none}
.prof-avatar img{width:100%;height:100%;object-fit:cover}
.crop-stage{position:relative;width:240px;height:240px;margin:10px auto;border-radius:50%;overflow:hidden;background:var(--bg2);border:2px solid var(--line);touch-action:none}
.crop-stage img{position:absolute;left:0;top:0;transform-origin:0 0;user-select:none;-webkit-user-drag:none;pointer-events:none}
.crop-ring{position:absolute;inset:0;border-radius:50%;box-shadow:0 0 0 9999px rgba(8,12,20,.55);pointer-events:none}
.crop-stage.sq{border-radius:28px}
.crop-stage.sq .crop-ring{border-radius:28px}
</style>

const app=document.getElementById('app');

function lsGet(k,d){ try{ const v=localStorage.getItem(k); return v===null?d:JSON.parse(v); }catch(e){ return d; } }
function lsSet(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }

function frDateTime(ts){ const d=new Date(ts); return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); }

function colorFor(s){ let h=0; for(let i=0;i<(s||'').length;i++) h=s.charCodeAt(i)+((h<<5)-h); return `hsl(${h%360},55%,55%)`; }
function toast(msg){ let el=document.getElementById('toast'); if(!el){ el=document.createElement('div'); el.id='toast'; el.className='toast'; document.body.appendChild(el);} el.textContent=msg; el.classList.add('show'); clearTimeout(window._tt); window._tt=setTimeout(()=>el.classList.remove('show'),2600); }

function myTheme(){ let t=lsGet(LS_THEME, CONFIG_DB.couleurDefaut||CONFIG.COULEUR_DEFAUT||'bleu'); if(t&&t.charAt(0)!=='#'){ const b=t.indexOf('.')>0?t.slice(0,t.indexOf('.')):t; if(b==='blanc'||b==='ardoise') t='bleu'; } return t; }
function _hexRgb(h){ h=(h||'').replace('#',''); if(h.length===3) h=h.split('').map(c=>c+c).join(''); const n=parseInt(h,16)||0; return {r:(n>>16)&255,g:(n>>8)&255,b:n&255}; }
function _lighten(h,amt){ const {r,g,b}=_hexRgb(h); const L=v=>Math.round(v+(255-v)*amt); const x=v=>('0'+v.toString(16)).slice(-2); return '#'+x(L(r))+x(L(g))+x(L(b)); }
function _darken(h,k){ const {r,g,b}=_hexRgb(h); const x=v=>('0'+Math.max(5,Math.round(v*k)).toString(16)).slice(-2); return '#'+x(r)+x(g)+x(b); }
function clearCustomAccent(){ const s=document.body.style; ['--acc','--acc2','--accText','--glow','--bg','--bg2','--card','--card2','--line','--txt','--muted','--shadow'].forEach(v=>s.removeProperty(v)); }
function appMode(){ return lsGet('batisuivi_mode','sombre')==='clair'?'clair':'sombre'; }

/* Mode clair : dérive des surfaces CLAIRES depuis l'accent (fond pâle, texte foncé, cartes claires). L'accent reste identique. */
function applyLightVars(){ try{
  const cs=getComputedStyle(document.body); let acc=((cs.getPropertyValue('--acc'))||'').trim(); if(acc.charAt(0)!=='#') acc='#3b82f6';
  const s=document.body.style;
  s.setProperty('--bg', _lighten(acc,0.90)); s.setProperty('--bg2', _lighten(acc,0.84));
  s.setProperty('--txt','#16202e'); s.setProperty('--muted','#5a6a80');
  s.setProperty('--card','rgba(255,255,255,.75)'); s.setProperty('--card2','rgba(255,255,255,.55)');
  s.setProperty('--line','rgba(20,32,54,.12)'); s.setProperty('--shadow','0 18px 40px -22px rgba(20,40,80,.22)');
}catch(_){ } }
function applyCustomAccent(hex){ try{ const {r,g,b}=_hexRgb(hex); const lum=(0.299*r+0.587*g+0.114*b)/255; const s=document.body.style; s.setProperty('--acc',hex); s.setProperty('--acc2',_lighten(hex,0.2)); s.setProperty('--accText', lum>0.6?'#0a0f1a':'#ffffff'); s.setProperty('--glow', r+','+g+','+b); s.setProperty('--bg',_darken(hex,0.09)); s.setProperty('--bg2',_darken(hex,0.14)); }catch(_){ } }
function applyTheme(){ const raw=myTheme()||''; clearCustomAccent();
  if(raw && raw.charAt(0)==='#'){ document.body.removeAttribute('data-theme'); document.body.removeAttribute('data-accent'); applyCustomAccent(raw); }
  else { const dot=raw.indexOf('.'); const base=dot>0?raw.slice(0,dot):raw; const acc=dot>0?raw.slice(dot+1):''; if(base&&base!=='bleu') document.body.setAttribute('data-theme',base); else document.body.removeAttribute('data-theme'); if(acc) document.body.setAttribute('data-accent',acc); else document.body.removeAttribute('data-accent'); }
  const _mode=appMode(); document.body.setAttribute('data-mode',_mode); if(_mode==='clair') applyLightVars();
  try{ document.body.classList.toggle('big-text', bigText()); }catch(_){ } applyAppIcons(); paintBg(); }
/* Force le fond premium (lueurs dérivées de l'accent) en écrivant le style du body :
   garantit le re-dessin quand on change de couleur, là où une simple variable CSS dans un dégradé ne suffit pas. */
function paintBg(){ try{
  const cs=getComputedStyle(document.body);
  // On dérive la lueur de --acc (qui change de façon fiable) ; --glow en secours.
  let glow='';
  const acc=((cs.getPropertyValue('--acc'))||'').trim();
  if(acc && acc.charAt(0)==='#'){ const c=_hexRgb(acc); glow=c.r+','+c.g+','+c.b; }
  if(!glow) glow=((cs.getPropertyValue('--glow'))||'').trim();
  if(!glow) glow='45,212,191';
  const bg=(((cs.getPropertyValue('--bg'))||'').trim())||'#0A1220';
  const bg2=(((cs.getPropertyValue('--bg2'))||'').trim())||'#0B1A2A';
  const light=appMode()==='clair'; const a1=light?'.14':'.45', a2=light?'.10':'.30';
  document.body.style.background=
    'radial-gradient(140% 110% at 100% -12%, rgba('+glow+','+a1+') 0%, transparent 55%),'+
    'radial-gradient(120% 100% at -12% 112%, rgba('+glow+','+a2+') 0%, transparent 55%),'+
    'linear-gradient(160deg,'+bg+' 0%,'+bg2+' 55%,'+bg+' 100%)';
  document.body.style.backgroundRepeat='no-repeat';
  document.body.style.backgroundAttachment='scroll';
  document.body.style.backgroundColor=bg;
}catch(_){ } }
let _iconCache={src:null,icon:null};
function _iconWithBg(src,size,cb){
  try{
    const img=new Image();
    img.onload=function(){
      try{
        const cv=document.createElement('canvas'); cv.width=size; cv.height=size; const ctx=cv.getContext('2d');
        ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,size,size);
        const pad=Math.round(size*0.06), max=size-pad*2;
        let w=img.naturalWidth||img.width, h=img.naturalHeight||img.height; if(!w||!h){ w=h=max; }
        const sc=Math.min(max/w,max/h), dw=Math.round(w*sc), dh=Math.round(h*sc);
        ctx.drawImage(img, Math.round((size-dw)/2), Math.round((size-dh)/2), dw, dh);
        cb(cv.toDataURL('image/png'));
      }catch(_){ cb(src); }
    };
    img.onerror=function(){ cb(src); };
    img.src=src;
  }catch(_){ cb(src); }
}
function applyAppIcons(){
  const nm=coName();
  // Nom affiché sur l'écran d'accueil du téléphone (espaces conservés)
  try{ document.title = nm+' — Suivi de chantier'; }catch(_){ }
  try{ const m=document.querySelector('meta[name="apple-mobile-web-app-title"]'); if(m) m.setAttribute('content',nm); }catch(_){ }
  try{ const m=document.querySelector('meta[name="application-name"]'); if(m) m.setAttribute('content',nm); }catch(_){ }
  try{
    const customIcon=(CONFIG_DB&&CONFIG_DB.appIcon)||'';
    const logo=coLogo(); if(!customIcon && !logo) return;
    const apply=(icon)=>{
      document.querySelectorAll('link[rel="apple-touch-icon"]').forEach(l=>l.href=icon);
      document.querySelectorAll('link[rel="icon"]').forEach(l=>l.href=icon);
      const man={ name:nm, short_name:nm, display:'standalone', background_color:'#0e1525', theme_color:'#0e1525', start_url:'.', icons:[{src:icon,sizes:'512x512',type:'image/png',purpose:'any'},{src:icon,sizes:'512x512',type:'image/png',purpose:'maskable'},{src:icon,sizes:'192x192',type:'image/png'}] };
      const blob=new Blob([JSON.stringify(man)],{type:'application/manifest+json'});
      const url=URL.createObjectURL(blob);
      let ml=document.querySelector('link[rel="manifest"]'); if(!ml){ ml=document.createElement('link'); ml.rel='manifest'; document.head.appendChild(ml); }
      if(ml._u) try{ URL.revokeObjectURL(ml._u); }catch(_){ } ml.href=url; ml._u=url;
    };
    // Icône dédiée = utilisée telle quelle (pleine, sans bord ajouté). Sinon : logo centré sur fond blanc.
    if(customIcon){ apply(customIcon); return; }
    if(_iconCache.src===logo && _iconCache.icon){ apply(_iconCache.icon); return; }
    _iconWithBg(logo,512,(icon)=>{ _iconCache={src:logo,icon:icon}; apply(icon); });
  }catch(e){}
}

  employe:{},

  boss:{gerer_chantiers:1,suppr_chantier:1,gerer_devis:1,gerer_vehicules:1,gerer_planning:1,voir_tableau:1,gerer_equipe:1,gerer_reglages:1}

function allRoles(){ const m={}; Object.keys(BUILTIN_ROLES).forEach(k=>m[k]={...BUILTIN_ROLES[k]}); const cr=(CONFIG_DB&&CONFIG_DB.roles)||{}; Object.keys(cr).forEach(k=>{ m[k]={...(m[k]||{}),...cr[k]}; }); return m; }

    // App Check (reCAPTCHA v3) : atteste que les requêtes viennent bien de l'app.

      AUTH_USER=u||null; AUTH_READY=true;
      if(u){
        // Données internes : chargées UNIQUEMENT pour un membre d'équipe connecté.

        }

        refTeam(u.uid).on('value',s=>{ const prof=s.val()||null; if(EMP_PREVIEW){ EMP_PREVIEW.me=prof||EMP_PREVIEW.me; lsSet('cache_me',prof); return; } if(DEV_ACCESS && ME && ME._dev){ return; } ME=prof; lsSet('cache_me',ME); loadSeenFromProfile(prof); if(ME&&SCREEN==='entry'){ SCREEN='team'; TAB='chantiers'; CUR_CHANTIER=null; } if(BOOTED) render(); });
      } else { ME=null; window._teamDataSubs=false; if(SCREEN==='team') SCREEN='entry'; if(BOOTED) render(); }

    CONFIG_DB=lsGet('batisuivi_config',{})||{};

    VEHICULES=lsGet('batisuivi_vehicules',{})||{};

<script>
/* ====================== ROUTER ====================== */
function render(){
  applyTheme();
  if(useFB && !AUTH_READY){ navEl.classList.add('hidden'); app.innerHTML=splash(); return; }
  if(SCREEN==='entry'){ navEl.classList.add('hidden'); return renderEntry(); }
  if(SCREEN==='dev'){ navEl.classList.add('hidden'); return renderDev(); }
  if(SCREEN==='client'){ navEl.classList.add('hidden'); return renderClient(); }
  if(SCREEN==='team'){
    if(useFB && !AUTH_USER){ navEl.classList.add('hidden'); return renderTeamAuth(); }
    if(useFB && AUTH_USER && !ME){ navEl.classList.add('hidden'); return renderJoinTeam(); }
    if(!ME){ navEl.classList.add('hidden'); return renderTeamAuth(); } // mode local : pas encore connecté
    if(isBoss() && !EMP_PREVIEW){
      initSwipeBack();
      if(CUR_CHANTIER && CHANTIERS[CUR_CHANTIER]){ if(!HUB) HUB='chantiers'; return renderBossChantier(); }
      if(HUB==='facturation') return renderFactuApp();
      if(HUB) return renderHub();
      return renderAccueil();
    }
    return renderTeamApp();
  }
}
function splash(){ return `<div class="center-wrap" style="text-align:center"><div class="hero-logo">${logoHTML()}</div><p class="note">Chargement…</p></div>`; }

/* ====================== ENTRÉE (choix du rôle) ====================== */
function renderEntry(){
  app.innerHTML=`<div class="center-wrap">
    <div style="text-align:center;margin-bottom:22px">
      <div class="hero-logo" style="width:148px;height:148px;border-radius:36px;font-size:76px;margin-bottom:18px">${logoHTML()}</div>
      <h1 style="font-size:28px;line-height:1.15;word-break:break-word;padding:0 6px">${esc(coName())}</h1>
      <p class="note" style="margin-top:8px">${esc(coSlogan())}</p>
    </div>
    <div class="role-choice">
      <div class="role-btn" onclick="goClientLogin()">
        <span class="ic"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
        <div><b>Je suis un client</b><small>Suivre l'avancement de mon chantier</small></div>
        <span class="arr">→</span>
      </div>
      <div class="role-btn" onclick="goTeam()">
        <span class="ic"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 18a1 1 0 0 0 1 1h18a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1H3a1 1 0 0 0-1 1z"/><path d="M10 10V5a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v5"/><path d="M4 15v-3a6 6 0 0 1 6-6"/><path d="M14 6a6 6 0 0 1 6 6v3"/></svg></span>
        <div><b>Je fais partie de l'équipe</b><small>Patron, chef ou ouvrier</small></div>
        <span class="arr">→</span>
      </div>
    </div>
    <div style="margin-top:22px">
      <p class="tag" style="text-align:center;margin-bottom:10px">Choisis ta couleur</p>
      <div style="display:flex;flex-direction:column;align-items:center">${themeSwatches(34)}</div>
    </div>
    <p class="note" style="text-align:center;margin-top:24px;font-size:11px;cursor:pointer" onclick="devStart()">Propulsé par BatiSuivi · ${APP_VERSION}</p>
  </div>`;
}
function goClientLogin(){ SCREEN='client'; CLIENT=null; render(); }
function goTeam(){ SCREEN='team'; render(); }
function backToEntry(){ DEV_ACCESS=false; SCREEN='entry'; render(); toTop(); }

/* ====================== ESPACE DÉVELOPPEUR (privé) ====================== */
const DEV_CODE="23112003";
const APP_VERSION="v135 · 04/07";
function askDevCode(){
  openModal(`<div class="grabber"></div><h2 style="margin-bottom:8px"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14.7 6.3a4 4 0 0 0-5.4 5.4L3 18v3h3l6.3-6.3a4 4 0 0 0 5.4-5.4l-2.7 2.7-2-2 2.7-2.7Z"/></svg> Espace développeur</h2>
    <p class="note">Réservé à l'installateur de l'application.</p>
    <input id="dev_code" type="password" inputmode="numeric" placeholder="Code d'accès" style="margin-top:10px;text-align:center;letter-spacing:4px;font-family:'Sora';font-weight:800">
    <button class="btn primary" style="width:100%;margin-top:10px" onclick="enterDev()">Entrer</button>
    <div id="dev_err" class="err"></div>`);
  setTimeout(()=>{const e=document.getElementById('dev_code');e&&e.focus();},60);
}
function enterDev(){
  const v=(document.getElementById('dev_code').value||'').trim();
  if(v!==DEV_CODE){ const e=document.getElementById('dev_err'); e.style.display='block'; e.textContent="Code incorrect."; return; }
  closeModal(); DEV_ACCESS=false; SCREEN='dev'; render(); toTop();
}
const DEV_EMAIL="massiliaconsulting1@gmail.com"; // accès dev réservé à CET email uniquement
function devAllowed(user){ if(!user) return false; if(DEV_EMAIL) return (user.email||'').toLowerCase()===DEV_EMAIL.toLowerCase(); return true; }
function devStart(){
  if(!useFB){ SCREEN='dev'; DEV_ACCESS=false; render(); toTop(); return; } // mode local de test
  const u=firebase.auth().currentUser;
  if(u && devAllowed(u)){ devAfterLogin(u); return; }   // déjà connecté avec le bon compte
  openDevLogin();
}
function openDevLogin(){
  openModal(`<div class="grabber"></div>
    <h2 style="text-align:center;margin-bottom:4px">Espace développeur</h2>
    <p class="note" style="text-align:center;margin-bottom:14px">Accès réservé.</p>
    <input id="dev_em" type="email" placeholder="Email" autocomplete="username">
    <input id="dev_pw" type="password" placeholder="Mot de passe" autocomplete="current-password" style="margin-top:8px" onkeydown="if(event.key==='Enter')devLoginPw()">
    <button class="btn primary" style="width:100%;margin-top:10px" onclick="devLoginPw()">Se connecter</button>
    <div id="dev_em_err" class="err"></div>`);
}
function devLoginPw(){
  const em=(val('dev_em')||'').trim(); const pwEl=document.getElementById('dev_pw'); const pw=pwEl?pwEl.value:'';
  const er=document.getElementById('dev_em_err');
  if(!em||!pw){ if(er){ er.style.display='block'; er.textContent="Entre l'email et le mot de passe."; } return; }
  if(er) er.style.display='none';
  firebase.auth().signInWithEmailAndPassword(em,pw).then(c=>devAfterLogin(c.user)).catch(e=>{ if(er){ er.style.display='block'; er.textContent=authMsg(e.code); } });
}
function devAfterLogin(user){
  if(!user) return;
  if(!devAllowed(user)){ try{ firebase.auth().signOut(); }catch(_){} const er=document.getElementById('dev_em_err'); if(er){ er.style.display='block'; er.textContent="Ce compte n'est pas autorisé pour l'espace dev."; } return; }
  closeModal(); SCREEN='dev'; DEV_ACCESS=false; CUR_CHANTIER=null; render(); toTop();
}
function contactInfo(){ const o=(CONFIG_DB&&CONFIG_DB.contact)||{}; return { tel:(o.tel||CONFIG.TELEPHONE||''), email:(o.email||CONFIG.EMAIL||''), adresse:(o.adresse||CONFIG.ADRESSE_ENTREPRISE||''), horaires:(o.horaires||CONFIG.HORAIRES||'') }; }
function renderDev(){
  const chs=Object.keys(CHANTIERS).map(id=>({id,...CHANTIERS[id]}));
  const nbCh=chs.length, nbTeam=Object.keys(TEAM).length, nbVeh=Object.keys(VEHICULES).length;
  const nbPhotos=chs.reduce((n,c)=>n+(c.photos?Object.keys(c.photos).length:0),0);
  const nbDocs=chs.reduce((n,c)=>n+(c.published?Object.keys(c.published).length:0),0);
  const ci=contactInfo();
  app.innerHTML=`<div class="center-wrap" style="justify-content:flex-start;max-width:520px">
    <button class="backbtn" style="align-self:flex-start" onclick="backToEntry()"><span class="ar"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></span> Quitter</button>
    <div style="text-align:center;margin:8px 0 16px"><div class="hero-logo"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14.7 6.3a4 4 0 0 0-5.4 5.4L3 18v3h3l6.3-6.3a4 4 0 0 0 5.4-5.4l-2.7 2.7-2-2 2.7-2.7Z"/></svg></div>
      <h1 style="font-size:22px">Espace développeur</h1>
      <p class="note" style="margin-top:8px">Accès total — ${esc(coName())}</p></div>

    <div class="card">
      <div class="section-title" style="margin-top:0"><h2 style="font-size:15px"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 3v18h18"/><path d="M7 16v-5M12 16V8M17 16v-3"/></svg> État de l'app</h2></div>
      <div class="kpis" style="margin-bottom:8px">
        <div class="kpi acc"><div class="big">${nbCh}</div><div class="lbl">Chantiers</div></div>
        <div class="kpi"><div class="big">${nbTeam}</div><div class="lbl">Équipe</div></div>
        <div class="kpi"><div class="big">${nbVeh}</div><div class="lbl">Véhicules</div></div>
      </div>
      <p class="note">${nbPhotos} photo(s) · ${nbDocs} document(s) publié(s) · Base : <b style="color:${useFB?'var(--ok)':'var(--warn)'}">${useFB?'Firebase (en ligne)':'Local (test)'}</b></p>
    </div>

    <div class="card" style="border-color:var(--acc)">
      <div class="section-title" style="margin-top:0"><h2 style="font-size:15px"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/></svg> Accès complet</h2></div>
      <p class="note">Ouvre l'app en <b>patron</b> : tu vois et modifies tout (chantiers, équipe, véhicules, planning, devis/factures, réglages). Utilise-le pour répondre à une demande d'un client.</p>
      <button class="btn primary" style="width:100%;margin-top:10px" onclick="devOpenAsBoss()">Ouvrir l'app en accès patron</button>
    </div>

    <div class="card">
      <div class="section-title" style="margin-top:0"><h2 style="font-size:15px"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg> Aperçu côté client</h2></div>
      <p class="note">Voir exactement ce que voit le client d'un chantier (avec son code).</p>
      ${nbCh?`<div style="margin-top:8px">${chs.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)).map(c=>`<div class="task-row"><div style="flex:1;min-width:0"><b style="font-size:13px">${esc(c.nom)}</b><div class="tag"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> ${esc(clientFull(c))} · 🔑 ${esc(c.clientCode||'—')}</div></div><button class="btn ghost mini" onclick="devOpenClient('${c.id}')"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg> Voir</button></div>`).join('')}</div>`:`<p class="note" style="margin-top:8px">Aucun chantier pour l'instant.</p>`}
    </div>

    <div class="card">
      <div class="section-title" style="margin-top:0"><h2 style="font-size:15px"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 1 1-4 0v-.1A1.6 1.6 0 0 0 7 19.4l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0-1.1-2.7H3a2 2 0 1 1 0-4h.1A1.6 1.6 0 0 0 4.6 7l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3 1.6 1.6 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 1 1.5 1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8 1.6 1.6 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"/></svg> Configuration de l'entreprise</h2></div>
      <p class="note" style="margin-bottom:8px">Identité affichée partout dans l'app.</p>
      <div style="display:flex;gap:12px;align-items:center;margin-bottom:8px">
        <div class="hero-logo" style="width:64px;height:64px;font-size:30px;margin:0">${coLogo()?`<img src="${coLogo()}" style="width:100%;height:100%;object-fit:contain;border-radius:14px">`:'🏗️'}</div>
        <div style="flex:1"><input type="file" id="cfg_logo_file" accept="image/*" style="display:none" onchange="devUploadLogo(this)">
          <button class="btn ghost mini" onclick="document.getElementById('cfg_logo_file').click()"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3l2-3h8l2 3h3a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> Changer le logo</button>
          ${coLogo()?`<button class="btn ghost mini" style="margin-top:6px" onclick="devRemoveLogo()">Retirer</button>`:''}</div>
      </div>
      <p class="note" style="margin:6px 0 8px">Icône de l'app sur l'écran d'accueil du téléphone (image <b>carrée</b>, pleine, sans bord blanc). Si vide, le logo ci-dessus est utilisé.</p>
      <div style="display:flex;gap:12px;align-items:center;margin-bottom:8px">
        <div class="hero-logo" style="width:64px;height:64px;font-size:30px;margin:0;border-radius:14px">${CONFIG_DB.appIcon?`<img src="${CONFIG_DB.appIcon}" style="width:100%;height:100%;object-fit:cover;border-radius:14px">`:'📱'}</div>
        <div style="flex:1"><input type="file" id="cfg_icon_file" accept="image/*" style="display:none" onchange="devUploadIcon(this)">
          <button class="btn ghost mini" onclick="document.getElementById('cfg_icon_file').click()"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3l2-3h8l2 3h3a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> Choisir l'icône</button>
          ${CONFIG_DB.appIcon?`<button class="btn ghost mini" style="margin-top:6px" onclick="devRemoveIcon()">Retirer</button>`:''}</div>
      </div>
      <label>Nom de l'entreprise</label><input id="cfg_nom" value="${esc(coName())}" placeholder="ex: Dupont Rénovation">
      <label>Slogan</label><input id="cfg_slogan" value="${esc(coSlogan())}" placeholder="ex: Votre chantier en toute confiance">
      <p class="note" style="margin:14px 0 8px">Coordonnées affichées aux clients (page Contact).</p>
      <label>Téléphone</label><input id="cfg_tel" value="${esc(ci.tel)}" placeholder="06 12 34 56 78">
      <label>Email</label><input id="cfg_email" value="${esc(ci.email)}" placeholder="contact@entreprise.fr">
      <label>Adresse</label><input id="cfg_adr" value="${esc(ci.adresse)}" placeholder="12 rue des Artisans, 21000 Dijon">
      <label>Horaires</label><input id="cfg_hor" value="${esc(ci.horaires)}" placeholder="Lun–Ven : 8h–18h">
      <label style="margin-top:10px">Couleur par défaut de l'app (pour tout le monde)</label>
      <p class="note" style="margin:2px 0 6px">Choisis parmi les couleurs de l'app. Touche Blanc ou Noir pour voir les variantes « + une couleur ».</p>
      ${devColorPicker()}
      <label style="margin-top:10px">Couleurs proposées aux utilisateurs</label>
      <p class="note" style="margin:2px 0 6px">Coche les couleurs que les utilisateurs pourront choisir dans leur menu. Les autres seront masquées. La couleur par défaut reste toujours proposée.</p>
      ${devColorAvailablePicker()}
      <div class="row" style="margin-top:10px"><div><label>Pointage horaire</label>
        <div class="row" style="gap:6px"><button class="btn ${pointageOn()?'primary':'ghost'} mini" onclick="devSetPointage(true)">Activé</button><button class="btn ${!pointageOn()?'primary':'ghost'} mini" onclick="devSetPointage(false)">Désactivé</button></div></div>
      </div>
      <label style="margin-top:10px">Facturation dans l'app</label>
      <div class="row" style="gap:6px"><button class="btn ${factuOn()?'primary':'ghost'} mini" onclick="devSetFactu(true)">Activée</button><button class="btn ${!factuOn()?'primary':'ghost'} mini" onclick="devSetFactu(false)">Désactivée</button></div>
      <label style="margin-top:10px">Compte-rendu vocal (IA)</label>
      <div class="row" style="gap:6px"><button class="btn ${iaOn()?'primary':'ghost'} mini" onclick="devSetIA(true)">Activée</button><button class="btn ${!iaOn()?'primary':'ghost'} mini" onclick="devSetIA(false)">Désactivée</button></div>
      <p class="note" style="font-size:11px;margin-top:4px">Affiche ou masque le bouton 🎤 de dictée IA dans les chantiers (utile pour le Pack IA ou un client qui n'en veut pas).</p>
      <p class="note" style="font-size:11px;margin-top:4px">Désactive si le client a déjà un logiciel de facturation (évite les doublons). Le suivi de chantier et les devis restent actifs.</p>
      <div class="row" style="margin-top:10px"><div><label>Préfixe devis</label><input id="cfg_devpre" type="text" value="${devisPrefix()}" maxlength="6"></div>
        <div><label>Prochain n° devis</label><input id="cfg_devnum" type="number" min="1" value="${(CONFIG_DB.devisCounter||0)+1}"></div></div>
      <div class="row" style="margin-top:10px"><div><label>Préfixe facture</label><input id="cfg_factpre" type="text" value="${factPrefix()}" maxlength="6"></div>
        <div><label>Prochain n° de facture</label><input id="cfg_fact" type="number" min="1" value="${(CONFIG_DB.factCounter||0)+1}" title="Numéro qui sera attribué à la prochaine facture"></div></div>
      <button class="btn primary" style="width:100%;margin-top:10px" onclick="devSaveConfig()"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg> Enregistrer la configuration</button>
    </div>

    <div class="card">
      <div class="section-title" style="margin-top:0"><h2 style="font-size:15px"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/></svg> Rôles & 📋 Modèles</h2></div>
      <p class="note">Gère les rôles/permissions et les modèles de chantier de l'entreprise (mêmes outils que le patron).</p>
      <button class="btn ghost" style="width:100%;margin-top:10px" onclick="openRolesManager()"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/></svg> Gérer les rôles & permissions</button>
      <button class="btn ghost" style="width:100%;margin-top:10px" onclick="openModelesManager()"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="8" y="3" width="8" height="4" rx="1"/><path d="M16 5h2a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2"/><path d="M9 12h6M9 16h6"/></svg> Gérer les modèles de chantier</button>
      <button class="btn ghost" style="width:100%;margin-top:10px" onclick="openEtapesManager()"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 3v18h18"/><path d="M7 16v-5M12 16V8M17 16v-3"/></svg> Gérer les étapes d'avancement</button>
    </div>

    <div class="card">
      <div class="section-title" style="margin-top:0"><h2 style="font-size:15px"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="3" width="20" height="18" rx="2"/><path d="M7 3v18M17 3v18M2 9h5M2 15h5M17 9h5M17 15h5"/></svg> Démo & données</h2></div>
      <p class="note">Choisis un ou plusieurs corps de métier, puis charge une démo réaliste adaptée.</p>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin:12px 0">

function devToggleColor(id){

  const i=sel.indexOf(id);

}

/* ====== Accès client sécurisé via la Cloud Function accesClient (v54) ======
   Le client n'a pas de compte : il ne lit/écrit plus la base en direct.
   Tout passe par le serveur, qui vérifie le code et ne renvoie que SON chantier. */
function clientApiCall(action, payload){
  if(!useFB) return Promise.reject(new Error("Indisponible hors-ligne."));
  const fn = firebase.app().functions('europe-west1').httpsCallable('accesClient');
  return fn(Object.assign({action:action}, payload||{})).then(r=>r.data);
}
function isRealClient(){ return !!(useFB && CLIENT && !BOSS_PREVIEW && !DEV_ACCESS); }
function clientPersist(action, payload){
  // Vrai client -> écriture ciblée via le serveur. Aperçu patron/dev ou mode local -> écriture directe.
  if(isRealClient()){
    const full = Object.assign({code:CLIENT.code, nom:CLIENT.nom}, payload||{});
    clientApiCall(action, full).catch(e=>{ toast((e&&e.message)||"Action refusée"); clientReload(); });
  } else {
    saveChantier(CLIENT.chantierId);
  }
}
function clientReload(cb){
  if(!isRealClient()){ if(cb)cb(); return; }
  clientApiCall('load',{code:CLIENT.code, nom:CLIENT.nom}).then(res=>{
    CHANTIERS={}; CHANTIERS[res.chantierId]=res.chantier;
    if(res.config){ CONFIG_DB=res.config; try{ syncEtapes(); }catch(e){} }
    CLIENT.chantierId=res.chantierId;
    if(cb)cb(); render();
  }).catch(e=>{ CLIENT=null; localStorage.removeItem(LS_CLIENT); SCREEN='entry'; toast("Session expirée, reconnecte-toi."); render(); });
}
function clientLogin(){
  const code=(document.getElementById('cl_code').value||'').trim().toUpperCase();
  const nom=(document.getElementById('cl_name').value||'').trim();
  const err=document.getElementById('cl_err');
  if(!code||!nom){ err.style.display='block'; err.textContent="Entre le code et ton nom."; return; }
  if(!useFB){
    // mode local de test : on filtre les chantiers locaux
    const found=Object.keys(CHANTIERS).find(id=>CHANTIERS[id] && (CHANTIERS[id].clientCode||'').toUpperCase()===code);
    if(!found){ err.style.display='block'; err.textContent="Code inconnu. Vérifie avec ton artisan."; return; }
    CLIENT={code, nom, chantierId:found}; lsSet(LS_CLIENT,CLIENT); render(); toTop(); return;
  }
  // mode Firebase : le serveur vérifie le code et ne renvoie que ce chantier (nettoyé)
  err.style.display='none';
  clientApiCall('load',{code:code, nom:nom}).then(res=>{
    CHANTIERS={}; CHANTIERS[res.chantierId]=res.chantier;
    if(res.config){ CONFIG_DB=res.config; try{ syncEtapes(); }catch(e){} }
    CLIENT={code, nom, chantierId:res.chantierId}; lsSet(LS_CLIENT,CLIENT);
    render(); toTop();
  }).catch(e=>{ err.style.display='block'; err.textContent=(e&&e.message)||"Code inconnu. Vérifie avec ton artisan."; });
}

function authMsg(c){ return ({'auth/invalid-email':"Email invalide.",'auth/user-not-found':"Aucun compte avec cet email.",'auth/wrong-password':"Mot de passe incorrect.",'auth/invalid-credential':"Email ou mot de passe incorrect.",'auth/email-already-in-use':"Un compte existe déjà avec cet email.",'auth/weak-password':"Mot de passe trop court (6 min).",'auth/network-request-failed':"Problème de connexion."})[c]||"Erreur, réessaie."; }

function teamLogin(){
  if(!useFB){ return localTeamDemo(); }
  const email=val('t_email'),pass=val('t_pass');
  if(!email||!pass) return tErr("Entre email et mot de passe.");
  tErr(''); firebase.auth().signInWithEmailAndPassword(email,pass).catch(e=>tErr(authMsg(e.code)));
}
function teamSignup(){
  if(!useFB){ return localTeamDemo(); }
  const nom=val('t_nom'),email=val('t_email'),pass=val('t_pass'),invite=(val('t_invite')||'').toUpperCase();
  if(!email||pass.length<6) return tErr("Email + mot de passe (6 car. min).");
  tErr('');
  // On crée d'abord le compte (=> connecté), PUIS on décide du rôle en lisant
  // l'équipe côté serveur : 1er compte = patron ; sinon, code d'invitation obligatoire.
  // (Avant, la décision se faisait avant connexion : une fois la base fermée,
  //  n'importe qui se serait cru "premier" et serait devenu patron.)
  firebase.auth().createUserWithEmailAndPassword(email,pass).then(cred=>{
    const user=cred.user;
    return db().ref('batisuivi/team').once('value').then(s=>{
      const team=s.val()||{};
      const isFirst = Object.keys(team).length===0;
      const finish=(v)=>{
        const invName=[v.prenom,v.nom].filter(Boolean).join(' ').trim();
        const finalNom = invName || nom || (user.email||'').split('@')[0];
        const prof={nom:finalNom,email,role:v.role,createdAt:Date.now()};
        if(v.prenom) prof.prenom=v.prenom; if(v.nom) prof.nomFamille=v.nom;
        TEAM[user.uid]=prof;
        return refTeam(user.uid).set(prof).then(()=>user.updateProfile({displayName:finalNom}).catch(()=>{}));
      };
      if(isFirst) return finish({role:'boss'});
      return refInvite(invite).once('value').then(si=>{ const v=si.val(); if(!v) throw {code:'bad-invite'}; return finish(v); });
    });
  }).catch(e=>{ if(e&&e.code==='bad-invite') tErr("Code d'invitation invalide. Demande-le au patron (tu peux aussi entrer ton code sur l'écran suivant)."); else tErr(authMsg(e&&e.code)); });
}

function teamGoogle(){
  if(!useFB){ return localTeamDemo(); }

  const mob=/iPhone|iPad|Android/i.test(navigator.userAgent||'');
  if(mob) firebase.auth().signInWithRedirect(p).catch(e=>tErr(authMsg(e.code)));
  else firebase.auth().signInWithPopup(p).then(c=>afterTeamAuth(c.user)).catch(e=>tErr(authMsg(e.code)));
}
function afterTeamAuth(user){

}
