/* ====================== CLIENT — tableau de bord ====================== */
function renderClientDashboard(){
  const ch=CHANTIERS[CLIENT.chantierId];
  if(!ch){ // chantier supprimé
    app.innerHTML=`<div class="center-wrap"><div class="card empty">Ce chantier n'est plus disponible.<br><br><button class="btn ghost" onclick="clientLogout()">Retour</button></div></div>`; return;
  }
  const etapeIdx=ETAPES.indexOf(ch.etape||ETAPES[0]);
  const pct=Math.round((etapeIdx/(ETAPES.length-1))*100);
  const photos=ch.photos?Object.keys(ch.photos).map(k=>({k,...ch.photos[k]})).sort((a,b)=>b.ts-a.ts):[];
  const docs=ch.docs?Object.keys(ch.docs).map(k=>Object.assign({k:k},ch.docs[k])):[];
  const pubDocs=ch.published?Object.keys(ch.published).map(pid=>({pid,...ch.published[pid]})).sort((a,b)=>(b.ts||0)-(a.ts||0)):[];
  const msgs=ch.messages?Object.keys(ch.messages).map(k=>({k,...ch.messages[k]})).filter(m=>!m.deleted).sort((a,b)=>a.ts-b.ts):[];
  app.innerHTML=`
  <div class="top"><div class="brand"><div class="logo">${logoHTML()}</div>
    <div class="bn"><b>${esc(ch.nom)}</b><small>${esc(coName())}</small></div></div>
    <button class="burger" onclick="openClientMenu()" aria-label="Menu"><span></span><span></span><span></span></button></div>
  ${BOSS_PREVIEW?`<div onclick="clientLogout()" style="background:var(--acc);color:var(--accText);text-align:center;padding:8px;border-radius:10px;margin:0 0 12px;font-weight:700;font-size:13px;cursor:pointer"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg> Aperçu vue client — touche pour revenir au chantier</div>`:''}

  <div class="card">
    <div class="section-title" style="margin-top:0"><h2>Avancement</h2><span class="pill acc">${pct}%</span></div>
    <div class="progress"><span style="width:${pct}%"></span></div>
    <div class="steps" style="margin-top:12px">${ETAPES.map((e,i)=>`<div class="step-dot ${i<=etapeIdx?'done':''}"></div>`).join('')}</div>
    <div style="margin-top:12px">${ETAPES.map((e,i)=>{ const done=i<etapeIdx, cur=i===etapeIdx; const col=cur?'var(--acc)':(done?'var(--ok)':'var(--muted)'); const mark=done?'✓':(cur?'●':'·'); return `<div style="display:flex;align-items:center;gap:8px;padding:3px 0;color:${col};font-weight:${cur?'800':(done?'600':'400')}"><span style="flex:none;width:16px;text-align:center">${mark}</span><span>${esc(e)}</span></div>`; }).join('')}</div>
    <p class="note" style="margin-top:8px">Début : ${frDate(ch.dateDebut)} · Fin prévue : ${frDate(ch.dateFin)}</p>
  </div>

  ${ch.dateRdv?`<div class="card" style="border-color:var(--acc)"><div class="section-title" style="margin-top:0"><h2><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg> Prochain rendez-vous</h2></div>
    <p style="font-weight:700;font-size:16px">${frDateTimeRdv(ch.dateRdv,ch.heureRdv)}</p>${ch.noteRdv?`<p class="note" style="margin-top:2px">${esc(ch.noteRdv)}</p>`:''}
    ${ch.rdvStatus==='accepte'?`<p class="tag" style="color:var(--ok);margin-top:8px"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="m8.5 12 2.5 2.5 4.5-4.5"/></svg> Rendez-vous confirmé</p>`
      :ch.rdvStatus==='contre'?`<p class="tag" style="color:var(--acc);margin-top:8px"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 14 4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 0 10h-1"/></svg> Vous avez proposé ${ch.rdvContre?esc(frDateTimeRdv(ch.rdvContre.date,ch.rdvContre.heure)):''}. En attente de confirmation.</p><button class="btn ghost mini" style="margin-top:6px" onclick="clientAcceptRdv()">Finalement, accepter le créneau proposé</button>`
      :`<div class="row" style="margin-top:10px"><button class="btn primary" style="flex:1" onclick="clientAcceptRdv()"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="m8.5 12 2.5 2.5 4.5-4.5"/></svg> Accepter</button><button class="btn ghost" style="flex:1" onclick="clientProposeRdv()"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg> Autre créneau</button></div>`}
    </div>`:''}

  <div class="card">
    <div class="section-title" style="margin-top:0"><h2><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3l2-3h8l2 3h3a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> Photos du chantier</h2><span class="tag">${photos.length}</span></div>
    ${photos.length?`<div class="photo-grid">${photos.slice(0,12).map(p=>`<div class="ph" style="background-image:url(${p.url})" onclick="clientViewPhoto('${p.k}')">${p.clientLiked?'<span class="ph-like">👍</span>':''}</div>`).join('')}</div><p class="note" style="margin-top:8px;font-size:11px">Touche une photo pour la voir en grand et la valider d'un 👍.</p>`:`<p class="note">Aucune photo pour l'instant. L'équipe en ajoutera au fil du chantier.</p>`}
  </div>

  ${(docs.length||pubDocs.length)?`<div class="card"><div class="section-title" style="margin-top:0"><h2><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M8 13h8M8 17h8"/></svg> Documents</h2></div>
    ${pubDocs.map(d=>`<div style="border-bottom:1px solid var(--line);padding:10px 0">
      <div class="task-row" style="padding:0"><div style="flex:1"><b style="font-size:14px">${d.type==='facture'?'🧾 Facture':'📄 Devis'}</b><div class="tag">${esc(d.num)} · ${d.date}</div>${d.signature?`<div class="tag" style="color:var(--ok);margin-top:2px"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="m8.5 12 2.5 2.5 4.5-4.5"/></svg> Signé le ${frSignAt(d.signedAt)} par ${esc(d.signedBy||'')}</div>`:''}</div>
        <button class="btn ghost mini" onclick="clientOpenDoc(CLIENT.chantierId,'${d.pid}')"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg> PDF</button></div>
      ${d.type==='devis'&&!d.signature?`<button class="btn primary" style="width:100%;margin-top:10px" onclick="clientSignDoc('${d.pid}')">✍️ Signer le devis (bon pour accord)</button>`:''}
    </div>`).join('')}
    ${docs.map(d=>`<div class="task-row"><span>📎 ${esc(d.nom)}</span><button class="btn ghost mini" style="margin-left:auto" onclick="clientOpenReport('${d.k}')">Ouvrir</button></div>`).join('')}</div>`:''}

  ${(()=>{ const crs=ch.crs?Object.keys(ch.crs).map(k=>({k,...ch.crs[k]})).filter(r=>r.published).sort((a,b)=>b.ts-a.ts):[]; if(!crs.length) return ''; return `<div class="card"><div class="section-title" style="margin-top:0"><h2><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="8" y="3" width="8" height="4" rx="1"/><path d="M16 5h2a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2"/><path d="M9 12h6M9 16h6"/></svg> Comptes-rendus</h2><span class="tag">${crs.length}</span></div>${crs.map(r=>`<div style="border-bottom:1px solid var(--line);padding:10px 0"><div style="display:flex;align-items:center;gap:8px"><b style="font-size:13px;flex:1">${frDateTime(r.ts)}</b><button class="btn ghost mini" onclick="crReportPDF(CLIENT.chantierId,'${r.k}')"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg> PDF</button></div>${r.taches_realisees?('<div style="margin-top:4px"><b><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14.7 6.3a4 4 0 0 0-5.4 5.4L3 18v3h3l6.3-6.3a4 4 0 0 0 5.4-5.4l-2.7 2.7-2-2 2.7-2.7Z"/></svg> Travaux réalisés</b><br>'+esc(r.taches_realisees)+'</div>'):''}${r.materiaux_manquants?('<div style="margin-top:4px"><b><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 8 12 3 3 8v8l9 5 9-5z"/><path d="M3 8l9 5 9-5M12 13v8"/></svg> Matériaux à prévoir</b><br>'+esc(r.materiaux_manquants)+'</div>'):''}${r.problemes?('<div style="margin-top:4px"><b><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10.3 3.5 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.5a2 2 0 0 0-3.4 0Z"/><path d="M12 9v4M12 17h.01"/></svg> Points d\'attention</b><br>'+esc(r.problemes)+'</div>'):''}${r.notes?('<div style="margin-top:4px"><b><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg> Notes</b><br>'+esc(r.notes)+'</div>'):''}</div>`).join('')}</div>`; })()}

  <div class="card">
    <div class="section-title" style="margin-top:0"><h2><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> Messages</h2></div>
    <div class="chat-thread" id="chatScroll" style="max-height:320px">${clientChatHTML(CLIENT.chantierId, ch, 'client')}</div>
    <div class="chat-bar" style="background:transparent;padding:6px 0 0">
      <input id="cl_msg" placeholder="Une question ?" onkeydown="if(event.key==='Enter'){event.preventDefault();clientSendMsg();}">
      <button class="btn primary" onclick="clientSendMsg()">Envoyer</button>
    </div>
  </div>`;
}
function clientSendMsg(){
  const t=val('cl_msg'); if(!t) return;
  const ch=CHANTIERS[CLIENT.chantierId]; if(!ch.messages) ch.messages={};
  const id=uid(); ch.messages[id]={from:'client',txt:t,ts:Date.now()};
  clientPersist('sendMessage',{txt:t}); render(); if(typeof chatScrollDown==='function') chatScrollDown();
}
function clientAcceptRdv(){ const ch=CHANTIERS[CLIENT.chantierId]; if(!ch||!ch.dateRdv) return; ch.rdvStatus='accepte'; delete ch.rdvContre; clientPersist('acceptRdv',{}); toast("Rendez-vous accepté ✅"); render(); }
function clientProposeRdv(){ const ch=CHANTIERS[CLIENT.chantierId]; if(!ch) return; const cn=ch.rdvContre||{}; openModal(`<div class="grabber"></div><h2 style="margin-bottom:10px">Proposer un autre créneau</h2>
    <label>Date souhaitée</label><input type="date" id="crdv_d" value="${esc(cn.date||ch.dateRdv||'')}">
    <label>Heure (optionnel)</label><input type="time" id="crdv_h" value="${esc(cn.heure||ch.heureRdv||'')}">
    <label>Message (optionnel)</label><input id="crdv_n" value="${esc(cn.note||'')}" placeholder="ex: plutôt en fin de journée">
    <div class="row" style="margin-top:12px"><button class="btn ghost" style="flex:1" onclick="closeModal()">Annuler</button><button class="btn primary" style="flex:2" onclick="clientSaveProposeRdv()">Envoyer ma proposition</button></div>`); }
function clientSaveProposeRdv(){ const ch=CHANTIERS[CLIENT.chantierId]; if(!ch) return; const d=val('crdv_d'); if(!d){ toast("Choisis une date."); return; } ch.rdvContre={date:d, heure:val('crdv_h')||'', note:val('crdv_n')||''}; ch.rdvStatus='contre'; clientPersist('proposeRdv',{date:d, heure:val('crdv_h')||'', note:val('crdv_n')||''}); closeModal(); toast("Proposition envoyée ✅"); render(); }
function clientEditMsg(k){ const ch=CHANTIERS[CLIENT.chantierId]; const m=ch.messages&&ch.messages[k]; if(!m) return; openPrompt("Modifier le message",m.txt,v=>{ if(!v) return; m.txt=v; m.edited=true; clientPersist('editMessage',{key:k, txt:v}); render(); }); setTimeout(()=>{const e=document.getElementById('pr_in'); if(e)e.value=m.txt;},70); }
function clientDelMsg(k){ if(!confirm("Supprimer ce message ?")) return; const ch=CHANTIERS[CLIENT.chantierId]; const m=ch.messages&&ch.messages[k]; if(!m) return; m.deleted=true; m.deletedBy=CLIENT.nom; clientPersist('deleteMessage',{key:k}); render(); }
function viewPhoto(url){ openModal(`<div class="grabber"></div><img src="${url}" style="width:100%;border-radius:12px">`); }
function clientViewPhoto(k){
  const ch=CHANTIERS[CLIENT.chantierId]; const p=ch&&ch.photos&&ch.photos[k]; if(!p) return;
  openModal(`<div class="grabber"></div><img src="${p.url}" style="width:100%;border-radius:12px">
    ${p.desc?`<p style="margin-top:10px;font-weight:600;line-height:1.5">${esc(p.desc)}</p>`:''}
    <p class="tag" style="margin-top:8px">${frDateTime(p.ts)}</p>
    <button class="btn ${p.clientLiked?'ok':'primary'}" style="width:100%;margin-top:10px" onclick="clientLikePhoto('${k}')">${p.clientLiked?'👍 Validée — retirer':"👍 J'aime / valider cette photo"}</button>`);
}
function clientLikePhoto(k){ const ch=CHANTIERS[CLIENT.chantierId]; const p=ch&&ch.photos&&ch.photos[k]; if(!p) return; p.clientLiked=!p.clientLiked; clientPersist('likePhoto',{key:k, liked:p.clientLiked}); clientViewPhoto(k); render(); }
function viewChantierPhoto(id,k){
  const c=CHANTIERS[id]; const p=c&&c.photos&&c.photos[k]; if(!p) return;
  openModal(`<div class="grabber"></div><img src="${p.url}" style="width:100%;border-radius:12px">
    <p class="tag" style="margin-top:8px">${p.by?'Ajoutée par '+esc(p.by)+' · ':''}${frDateTime(p.ts)}${p.clientLiked?' · 👍 validée par le client':''}</p>
    <label style="margin-top:10px">Description (visible par le client) 👁️</label>
    <textarea id="ph_desc_${k}" rows="2" placeholder="ex : Pose du carrelage terminée dans la salle de bain">${esc(p.desc||'')}</textarea>
    <button class="btn ghost mini" style="margin-top:6px" onclick="setPhotoDesc('${id}','${k}')"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg> Enregistrer la description</button>
    <label style="margin-top:10px">Étiquette</label>
    <div class="row">
      <button class="btn ${p.tag==='avant'?'primary':'ghost'} mini" onclick="setPhotoTag('${id}','${k}','avant')">Avant</button>
      <button class="btn ${p.tag==='apres'?'primary':'ghost'} mini" onclick="setPhotoTag('${id}','${k}','apres')">Après</button>
      <button class="btn ${!p.tag?'primary':'ghost'} mini" onclick="setPhotoTag('${id}','${k}','')">Aucune</button></div>
    <button class="btn danger" style="width:100%;margin-top:10px" onclick="delChantierPhoto('${id}','${k}')"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M10 11v6M14 11v6"/></svg> Supprimer cette photo</button>`);
}
function setPhotoTag(id,k,tag){ const c=CHANTIERS[id]; if(!c.photos||!c.photos[k])return; if(tag)c.photos[k].tag=tag; else delete c.photos[k].tag; saveChantier(id); viewChantierPhoto(id,k); render(); }
function setPhotoDesc(id,k){ const c=CHANTIERS[id]; if(!c.photos||!c.photos[k])return; const e=document.getElementById('ph_desc_'+k); const v=e?e.value.trim():''; if(v)c.photos[k].desc=v; else delete c.photos[k].desc; saveChantier(id); toast(v?"Description enregistrée ✅":"Description retirée"); render(); }
function delChantierPhoto(id,k){ if(!confirm("Supprimer cette photo ?")) return; const c=CHANTIERS[id]; if(c.photos)delete c.photos[k]; saveChantier(id); closeModal(); render(); }
function avantApresCard(id,c){
  const photos=c.photos?Object.keys(c.photos).map(k=>({k,...c.photos[k]})):[];
  const av=photos.filter(p=>p.tag==='avant'), ap=photos.filter(p=>p.tag==='apres');
  if(!av.length && !ap.length) return '';
  const col=(title,arr)=>`<div style="flex:1;min-width:0"><div class="tag" style="margin-bottom:6px;text-align:center">${title}</div>${arr.length?arr.map(p=>`<div onclick="viewChantierPhoto('${id}','${p.k}')" style="background-image:url(${p.url});width:100%;height:100px;border-radius:10px;background-size:cover;background-position:center;border:1px solid var(--line);margin-bottom:8px;cursor:pointer"></div>`).join(''):'<p class="note" style="text-align:center">—</p>'}</div>`;
  return `<div class="card"><div class="section-title" style="margin-top:0"><h2 style="font-size:15px"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3l2-3h8l2 3h3a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> Avant / Après</h2></div>
    <div style="display:flex;gap:10px">${col('AVANT',av)}${col('APRÈS',ap)}</div>
    <p class="note" style="margin-top:8px;font-size:11px">Touche une photo dans la galerie ci-dessus puis « Avant » ou « Après » pour la classer ici.</p></div>`;
}
</script>
<script>
/* ====================== APP ÉQUIPE ====================== */
function openModal(html){ let m=document.getElementById('modal'); if(!m){ m=document.createElement('div'); m.id='modal'; m.className='modal'; document.body.appendChild(m);} m.innerHTML=`<div class="modal-card">${html}</div>`; m.classList.remove('hidden'); m.onclick=e=>{ if(e.target===m) closeModal(); }; bindSheetDrag(); }
function closeModal(){ const m=document.getElementById('modal'); if(m) m.classList.add('hidden'); }
function bindSheetDrag(){
  const m=document.getElementById('modal'); if(!m) return; const card=m.querySelector('.modal-card'); if(!card) return;
  card.style.transition=''; card.style.transform=''; let sy=null,dy=0;
  const yOf=e=>(e.touches?e.touches[0]:e).clientY;
  card.ontouchstart=e=>{ let top=0; try{ top=card.getBoundingClientRect().top; }catch(_){}
    if(yOf(e)-top>56){ sy=null; return; } // ne démarre que depuis le haut (poignée), laisse défiler le contenu
    sy=yOf(e); dy=0; card.style.transition='none'; };
  card.ontouchmove=e=>{ if(sy===null) return; dy=Math.max(0,yOf(e)-sy); card.style.transform='translateY('+dy+'px)'; if(dy>0&&e.cancelable)e.preventDefault(); };
  card.ontouchend=()=>{ if(sy===null) return; card.style.transition='transform .25s ease';
    if(dy>110){ card.style.transform='translateY(110%)'; setTimeout(closeModal,180); } else { card.style.transform='translateY(0)'; } sy=null; };
}

function myChantiers(){
  const all=Object.keys(CHANTIERS).map(id=>({id,...CHANTIERS[id]})).filter(c=>!c.archived);
  if(isChef()) return all;                    // chef + boss voient tout
  const myUid=AUTH_USER?AUTH_USER.uid:'';      // employé : seulement ses chantiers assignés
  return all.filter(c=>c.assignes && c.assignes[myUid]);
}
function myArchived(){
  let all=Object.keys(CHANTIERS).map(id=>({id,...CHANTIERS[id]})).filter(c=>c.archived);
  if(!isChef()){ const u=AUTH_USER?AUTH_USER.uid:''; all=all.filter(c=>c.assignes && c.assignes[u]); }
  return all;
}

function isLate(c){ return c.dateFin && c.dateFin<todayISO() && c.etape!==ETAPES[ETAPES.length-1]; }
function devisSigne(c){ if(!c||!c.published) return false; return Object.values(c.published).some(d=>d&&d.type==='devis'&&d.signature); }
function mergeSeen(local,remote,bool){ const out=Object.assign({},local||{}); if(remote) Object.keys(remote).forEach(k=>{ out[k]= bool ? (out[k]||remote[k]) : Math.max(out[k]||0, remote[k]||0); }); return out; }
function seenRef(){ const u=myUid(); return (useFB && u && u!=='local-boss' && u!=='dev-admin') ? refTeam(u).child('seen') : null; }
function pushSeen(type,obj){ try{ const r=seenRef(); if(r) r.child(type).set(obj); }catch(_){ } }
function loadSeenFromProfile(prof){ if(!prof||!prof.seen) return; const s=prof.seen;
  MSG_SEEN=mergeSeen(MSG_SEEN,s.msg); ETAPE_SEEN=mergeSeen(ETAPE_SEEN,s.etape); SIGN_SEEN=mergeSeen(SIGN_SEEN,s.sign,true); VEH_SEEN=mergeSeen(VEH_SEEN,s.veh); NOTES_SEEN=mergeSeen(NOTES_SEEN,s.notes); CHAT_SEEN=mergeSeen(CHAT_SEEN,s.chat);
  lsSet('msg_seen',MSG_SEEN); lsSet('etape_seen',ETAPE_SEEN); lsSet('sign_seen',SIGN_SEEN); lsSet('veh_seen',VEH_SEEN); lsSet('notes_seen',NOTES_SEEN); lsSet('chat_seen',CHAT_SEEN);
}
function chUnread(c,id){ if(!c||!c.messages) return 0; const seen=MSG_SEEN[id]||0; return Object.values(c.messages).filter(m=>m&&m.from==='client'&&!m.deleted&&(m.ts||0)>seen).length; }
function totalUnreadMsgs(){ return myChantiers().reduce((n,c)=>n+chUnread(c,c.id),0); }
function markMsgSeen(id){ const c=CHANTIERS[id]; let latest=Date.now(); if(c&&c.messages){ Object.values(c.messages).forEach(m=>{ if(m&&(m.ts||0)>latest) latest=m.ts; }); } MSG_SEEN[id]=latest; lsSet('msg_seen',MSG_SEEN); pushSeen('msg',MSG_SEEN); }
function chAdvanced(c,id){ const cur=ETAPES.indexOf(c.etape||ETAPES[0]); if(ETAPE_SEEN[id]===undefined){ return 0; } return Math.max(0,cur-ETAPE_SEEN[id]); }
function totalAdvanced(){ return myChantiers().filter(c=>chAdvanced(c,c.id)>0).length; }
function markEtapeSeen(id){ const c=CHANTIERS[id]; if(!c)return; ETAPE_SEEN[id]=ETAPES.indexOf(c.etape||ETAPES[0]); lsSet('etape_seen',ETAPE_SEEN); pushSeen('etape',ETAPE_SEEN); }
function ensureEtapeBaseline(){ let ch=false; Object.keys(CHANTIERS).forEach(id=>{ if(ETAPE_SEEN[id]===undefined){ ETAPE_SEEN[id]=ETAPES.indexOf(CHANTIERS[id].etape||ETAPES[0]); ch=true; } }); if(ch){ lsSet('etape_seen',ETAPE_SEEN); pushSeen('etape',ETAPE_SEEN); } }
function unseenSigned(){ let n=0; Object.keys(CHANTIERS).forEach(id=>{ const c=CHANTIERS[id]; if(c.published) Object.keys(c.published).forEach(pid=>{ const d=c.published[pid]; if(d.signature && !SIGN_SEEN[pid]) n++; }); }); return n; }
function joursDepuis(ts){ if(!ts) return 0; return Math.floor((Date.now()-ts)/86400000); }
function relanceDevis(d){ if(!d || d.type!=='devis' || d.signature) return 0; const j=joursDepuis(d.ts); return j>=5? j : 0; }
function totalRelances(){ let n=0; Object.values(CHANTIERS).forEach(c=>{ if(c.published) Object.values(c.published).forEach(d=>{ if(relanceDevis(d)) n++; }); }); return n; }
function markSignedSeen(){ let ch=false; Object.keys(CHANTIERS).forEach(id=>{ const c=CHANTIERS[id]; if(c.published) Object.keys(c.published).forEach(pid=>{ if(c.published[pid].signature && !SIGN_SEEN[pid]){ SIGN_SEEN[pid]=true; ch=true; } }); }); if(ch){ lsSet('sign_seen',SIGN_SEEN); pushSeen('sign',SIGN_SEEN); } }

function filterClients(){ const q=(document.getElementById('clSearch').value||'').toLowerCase().trim(); document.querySelectorAll('#clList .card').forEach(el=>{ el.style.display=(!q||(el.getAttribute('data-name')||'').includes(q))?'':'none'; }); }

let _csw=null;
function chTouchStart(e,id){ const card=e.currentTarget; _csw={id,card,x:e.touches[0].clientX,y:e.touches[0].clientY,dx:0,locked:null}; }
function chTouchMove(e){ if(!_csw)return; const t=e.touches[0]; const dx=t.clientX-_csw.x, dy=t.clientY-_csw.y;
  if(_csw.locked===null && (Math.abs(dx)>6||Math.abs(dy)>6)) _csw.locked=Math.abs(dx)>Math.abs(dy)?'h':'v';
  if(_csw.locked!=='h') return;
  if(e.cancelable) e.preventDefault();
  _csw.dx=Math.min(0,Math.max(dx,-180));
  _csw.card.style.transition='none'; _csw.card.style.transform='translateX('+_csw.dx+'px)';
}
function chTouchEnd(e){ if(!_csw)return; const card=_csw.card, dx=_csw.dx; card.style.transition='transform .2s ease';
  if(dx<-70){ card.style.transform='translateX(-168px)'; card.dataset.open='1'; }
  else { card.style.transform='translateX(0)'; card.dataset.open=''; }
  _csw=null;
}
function chTap(id,ev){ const card=ev.currentTarget;
  if(card.dataset.open==='1'){ card.style.transition='transform .2s ease'; card.style.transform='translateX(0)'; card.dataset.open=''; return; }
  openChantier(id);
}

function fmtDur(ms){ if(!ms||ms<0) return '—'; const m=Math.round(ms/60000); const h=Math.floor(m/60); const mm=m%60; return h>0? `${h}h${String(mm).padStart(2,'0')}` : `${mm}min`; }

/* ============== MODULE PROJECTION (rendu IA) ============== */
let _projImgs={}, _projLast={};
function projectionCard(id,c){
  const projs=c.projections?Object.keys(c.projections).map(k=>Object.assign({k:k},c.projections[k])).sort((a,b)=>(b.ts||0)-(a.ts||0)):[];
  let h=`<div class="card"><div class="section-title" style="margin-top:0"><h2 style="font-size:15px">${icone('palette')} Projection — rendu IA</h2></div>
    <p class="note" style="margin:0 0 10px;font-size:12px">Montre au client le résultat : une photo de l'existant + l'inspiration du client → un rendu généré. Chaque génération a un petit coût, elle ne se lance qu'au clic sur « Générer ».</p>
    <div class="row" style="gap:8px">
      <div style="flex:1;min-width:0">
        <label style="font-size:12px">Photo actuelle (l'existant) *</label>
        <div id="proj_prev_a_${id}" style="margin:4px 0"></div>
        <input type="file" accept="image/*" id="proj_in_a_${id}" style="display:none" onchange="projPick('${id}','a',this)">
        <button class="btn ghost" style="width:100%" onclick="document.getElementById('proj_in_a_${id}').click()">📷 Choisir</button>
      </div>
      <div style="flex:1;min-width:0">
        <label style="font-size:12px">Inspiration du client</label>
        <div id="proj_prev_i_${id}" style="margin:4px 0"></div>
        <input type="file" accept="image/*" id="proj_in_i_${id}" style="display:none" onchange="projPick('${id}','i',this)">
        <button class="btn ghost" style="width:100%" onclick="document.getElementById('proj_in_i_${id}').click()">📷 Choisir</button>
      </div>
    </div>
    <label style="margin-top:10px;font-size:12px">Précisions (optionnel)</label>
    <input id="proj_txt_${id}" placeholder="ex: garder la fenêtre, sol parquet clair">
    <button class="btn primary" style="width:100%;margin-top:10px" onclick="projGenerate('${id}')">✨ Générer le rendu</button>
    <div id="proj_result_${id}" style="margin-top:10px"></div>`;
  if(projs.length){
    h+=`<div class="section-title"><h2 style="font-size:14px">Rendus enregistrés</h2></div>`;
    projs.forEach(p=>{ h+=`<div style="margin-bottom:10px"><img src="${p.result}" style="width:100%;border-radius:10px;border:1px solid var(--line)"><div class="tag" style="display:flex;align-items:center;gap:8px">${frSignAt(p.ts)}${p.by?(' · '+esc(p.by)):''}<span style="flex:1"></span><button class="iconbtn" title="Télécharger" onclick="projDownloadSaved('${id}','${p.k}')">${icone('download')}</button><button class="iconbtn danger" onclick="delProjection('${id}','${p.k}')"><svg class="x-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button></div></div>`; });
  }
  h+=`</div>`;
  return h;
}
function _projCompress(dataUrl,cb){ const img=new Image(); img.onload=()=>{ const cv=document.createElement('canvas'); const S=900; let w=img.width,hh=img.height; if(w>hh){ if(w>S){hh=hh*S/w;w=S;} } else { if(hh>S){w=w*S/hh;hh=S;} } cv.width=w;cv.height=hh; cv.getContext('2d').drawImage(img,0,0,w,hh); cb(cv.toDataURL('image/jpeg',0.7)); }; img.onerror=()=>cb(null); img.src=dataUrl; }
function projPick(id,slot,input){ const f=input.files&&input.files[0]; if(!f) return; const r=new FileReader(); r.onload=e=>{ _projCompress(e.target.result,url=>{ if(!url){ toast("Image illisible"); return; } if(!_projImgs[id])_projImgs[id]={}; _projImgs[id][slot]=url; const prev=document.getElementById('proj_prev_'+slot+'_'+id); if(prev) prev.innerHTML='<img src="'+url+'" style="width:100%;border-radius:8px;border:1px solid var(--line)">'; }); }; r.readAsDataURL(f); }
function projGenerate(id){
  const imgs=_projImgs[id]||{};
  if(!imgs.a){ toast("Ajoute d'abord la photo actuelle"); return; }
  const txt=(document.getElementById('proj_txt_'+id)||{}).value||'';
  const res=document.getElementById('proj_result_'+id);
  if(res) res.innerHTML='<p class="note" style="margin:0">⏳ Génération du rendu… (quelques secondes, ne ferme pas la page)</p>';
  const pa=imgs.a.split(',').pop(), pi=imgs.i?imgs.i.split(',').pop():null;
  const fn=firebase.app().functions('europe-west1').httpsCallable('projectionIA');
  fn({photoActuelle:pa, photoInspiration:pi, texte:txt}).then(r=>{
    const out=r.data&&r.data.image;
    if(!out){ if(res) res.innerHTML='<p class="note" style="margin:0;color:var(--danger)">❌ Aucun rendu reçu. Réessaie.</p>'; return; }
    const url=(String(out).indexOf('data:')===0)?out:('data:image/png;base64,'+out);
    _projLast[id]=url;
    if(res) res.innerHTML='<img src="'+url+'" style="width:100%;border-radius:10px;border:1px solid var(--line)"><div class="row" style="gap:8px;margin-top:10px"><button class="btn ghost" style="flex:1" onclick="projDownload(\''+id+'\')">⬇️ Télécharger</button><button class="btn primary" style="flex:2" onclick="projSave(\''+id+'\')">💾 Enregistrer</button></div>';
  }).catch(e=>{ if(res) res.innerHTML='<p class="note" style="margin:0;color:var(--danger)">❌ '+esc((e&&e.message)||'Erreur pendant la génération')+'</p>'; });
}
function projSave(id){ const url=_projLast&&_projLast[id]; if(!url){ toast("Rien à enregistrer"); return; } _projCompress(url,small=>{ if(!small){ toast("Souci à l'enregistrement"); return; } const store=_projStore(id); if(!store){ toast("Erreur"); return; } store[uid()]={result:small,ts:Date.now(),by:ME?ME.nom:''}; _projPersist(id); toast("Rendu enregistré ✅"); render(); }); }
function delProjection(id,k){ if(!confirm("Supprimer ce rendu ?")) return; const store=_projStore(id); if(store&&store[k]){ delete store[k]; _projPersist(id); render(); } }
function projDownload(id){ const url=_projLast&&_projLast[id]; if(!url){ toast("Génère d'abord un rendu"); return; } const a=document.createElement('a'); a.href=url; a.download='rendu_'+((CHANTIERS[id]&&CHANTIERS[id].nom)||'chantier').replace(/[^a-z0-9]+/gi,'_')+'.png'; document.body.appendChild(a); a.click(); a.remove(); }
function projDownloadSaved(id,k){ const store=_projStore(id); const p=store&&store[k]; if(!p||!p.result) return; const a=document.createElement('a'); a.href=p.result; a.download='rendu_'+((CHANTIERS[id]&&CHANTIERS[id].nom)||'chantier').replace(/[^a-z0-9]+/gi,'_')+'.jpg'; document.body.appendChild(a); a.click(); a.remove(); }
let IA_PROJ = (function(){ try{ var v=lsGet('batisuivi_iaproj',{}); return (v&&typeof v==='object')?v:{}; }catch(_){ return {}; } })();
function _projStore(id){ return id==='ia' ? IA_PROJ : (CHANTIERS[id] ? (CHANTIERS[id].projections||(CHANTIERS[id].projections={})) : null); }
function _projPersist(id){ if(id==='ia'){ try{ lsSet('batisuivi_iaproj', IA_PROJ); }catch(_){ } } else if(CHANTIERS[id]){ saveChantier(id); } }
function viewProjection(){

function chSetCtype(t){

  if(bp) bp.className='btn '+(pro?'ghost':'primary'); if(bpr) bpr.className='btn '+(pro?'primary':'ghost');
  const lp=document.getElementById('lbl_prenom'), ln=document.getElementById('lbl_nom');
  if(lp) lp.textContent='Prénom '+(pro?'du contact':'du client'); if(ln) ln.textContent='Nom '+(pro?'du contact':'du client');
}
function saveChantierForm(id){
  const nom=val('f_nom'); if(!nom){ toast("Donne un nom au chantier"); return; }

  const fields={nom, clientType:ctype, clientPrenom:val('f_prenom'), client:val('f_client'), clientSociete:val('f_societe'), clientSiren:(val('f_siren')||'').replace(/\s/g,''), clientTvaIntra:val('f_ctva'), adresse:val('f_adr'), cp:val('f_cp'), ville:val('f_ville'), clientTel:val('f_ctel'), clientEmail:val('f_cemail'), dateDebut:val('f_d1'), dateFin:val('f_d2')};

}

<script>

function viewMembersReadonly(){

  h+=`</div><p class="note" style="font-size:11px;text-align:center">Pour écrire à un collègue, va dans l'onglet 💬 Messages.</p>`;

}
function viewEquipe(){
  const members=Object.keys(TEAM).map(u=>({u,...TEAM[u]}));
  let h='';
  h+=`<div class="card"><div class="section-title" style="margin-top:0"><h2 style="font-size:15px">Membres (${members.length})</h2></div>`;
  members.sort((a,b)=>({boss:0,chef:1,employe:2}[niveauOf(a.role)]-{boss:0,chef:1,employe:2}[niveauOf(b.role)])).forEach(m=>{
    const nb=isBoss()?nbNotesUnseen(m.u):0;
    const clickable=isBoss();
    h+=`<div class="member-row" ${clickable?`onclick="openMemberNotes('${m.u}')" style="cursor:pointer"`:''}>${avatarTag(m)}
      <div style="flex:1"><b>${esc(m.nom)}</b><div class="tag">${esc(m.email||'')}</div></div>
      ${nb?`<span class="note-badge">${nb}</span>`:''}
      <span class="pill ${niveauOf(m.role)==='boss'?'acc':''}">${roleLabel(m.role)}</span>
      ${isBoss()&&niveauOf(m.role)!=='boss'?`<button class="iconbtn danger" onclick="event.stopPropagation();removeMember('${m.u}')"><svg class="x-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button>`:''}</div>`;
  });
  h+=`</div>`;
  if(isBoss()) h+=`<p class="note" style="margin:-4px 0 12px;font-size:11px"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1Z"/><path d="M8 7h8M8 11h8M8 15h5"/></svg> Touche un membre pour voir ses notes de frais. La pastille rouge indique le nombre de photos reçues.</p>`;
  if(isBoss()){
    h+=`<details class="acc"><summary><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6M15.5 7.5l3 3L22 7l-3-3"/></svg> Inviter dans l'équipe</summary><div class="acc-body">
      <p class="note">Renseigne le prénom et le nom, choisis le rôle, génère le code et donne-le à la personne. Son profil sera déjà rempli à son inscription.</p>

      <label style="margin-top:10px">Rôle de la personne</label>
      <select id="inviteRole">${Object.keys(allRoles()).filter(k=>k!=='boss').map(k=>`<option value="${k}">${esc(roleLabel(k))}</option>`).join('')}</select>
      <button class="btn primary" style="width:100%;margin-top:10px" onclick="genInvite()">Générer le code d'invitation</button>
      <div id="inviteOut"></div>
    </div></details>`;

function removeMember(u){ if(!confirm("Retirer ce membre de l'équipe ?")) return; if(useFB) refTeam(u).remove(); else { delete TEAM[u]; lsSet('batisuivi_team',TEAM); } render(); }

  if(!useFB) toast("(démo) code généré : "+c);
}

/* ====================== VÉHICULES (tous consultent, chef/boss gèrent) ====================== */
function vAssignes(v){ if(v.assignes) return Object.keys(v.assignes); if(v.assigne) return [v.assigne]; return []; }

  const list=Object.keys(VEHICULES).map(id=>({id,...VEHICULES[id]})).sort((a,b)=>(a.nom||'').localeCompare(b.nom||''));
  let h='';
  if(!list.length){ h+=`<div class="card empty">${isChef()?"Aucun véhicule. Touche le bouton + en bas à droite pour en ajouter un.":"Aucun véhicule enregistré pour l'instant."}</div>`; return h; }
  list.forEach(v=>{
    const asg=vAssignes(v).filter(u=>TEAM[u]);
    const nbPhotos=v.photos?Object.keys(v.photos).length:0;
    const nbUnseen=nbVehUnseen(v.id);
    h+=`<div class="card">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="font-size:30px;flex:none">${esc(v.emoji||'🚐')}</div>
        <div style="flex:1;min-width:0"><b style="font-family:'Sora';font-size:16px">${esc(v.nom||'Véhicule')}</b>
          <div class="tag" style="margin-top:2px">${v.immat?`🔖 ${esc(v.immat)}`:''}${v.immat&&v.carburant?' · ':''}${v.carburant?`${carburantIcon(v.carburant)} ${esc(v.carburant)}`:''}</div>
          <div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">${asg.length?asg.map(u=>`<span class="pill acc"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> ${esc(TEAM[u].nom||'')}</span>`).join(''):`<span class="pill">Non assigné</span>`}</div>
        </div>
        <button class="warn-btn ${nbPhotos?'has':''}" onclick="openVehIncidents('${v.id}')" aria-label="Incidents"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>${nbUnseen?`<span class="badge">${nbUnseen}</span>`:''}</button>
      </div>
      ${v.note?`<div class="note" style="margin-top:8px"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg> ${esc(v.note)}</div>`:''}
      ${isChef()?`<div class="row" style="margin-top:12px">
        <button class="btn ghost mini" onclick="assignVehicule('${v.id}')">Assigner</button>
        <button class="iconbtn edit" onclick="editVehicule('${v.id}')"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></button>
        <button class="iconbtn danger" onclick="delVehicule('${v.id}')"><svg class="x-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button></div>`:''}
    </div>`;
  });
  return h;
}
function newVehicule(){ vehiculeForm(null); }
function editVehicule(id){ vehiculeForm(id); }
const CARBURANTS=['Diesel','Essence','Électrique','Hybride','GPL'];
function carburantIcon(c){ return {'Diesel':'⛽','Essence':'⛽','Électrique':'🔌','Hybride':'🔋','GPL':'💨'}[c]||'⛽'; }
function vehiculeForm(id){
  const v=id?VEHICULES[id]:{nom:'',immat:'',emoji:'🚐',note:'',carburant:'Diesel'};
  const emojis=['🚐','🚚','🛻','🚗','🚙','🏍️'];

    <label>Type</label>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px">
      ${emojis.map(e=>`<div onclick="document.getElementById('v_emoji').value='${e}';document.querySelectorAll('.v-emo').forEach(x=>x.style.borderColor='var(--line)');this.style.borderColor='var(--acc)'" class="v-emo" style="font-size:24px;width:46px;height:46px;display:grid;place-items:center;border:2px solid ${e===(v.emoji||'🚐')?'var(--acc)':'var(--line)'};border-radius:12px;cursor:pointer">${e}</div>`).join('')}
    </div>
    <input type="hidden" id="v_emoji" value="${esc(v.emoji||'🚐')}">
    <label>Nom du véhicule</label><input id="v_nom" value="${esc(v.nom||'')}" placeholder="ex: Camion Master">
    <label>Immatriculation</label><input id="v_immat" value="${esc(v.immat||'')}" placeholder="ex: AB-123-CD" style="text-transform:uppercase">
    <label>Carburant</label>
    <select id="v_carburant">${CARBURANTS.map(c=>`<option ${c===(v.carburant||'Diesel')?'selected':''}>${c}</option>`).join('')}</select>
    <label>Note (optionnel)</label><input id="v_note" value="${esc(v.note||'')}" placeholder="ex: révision en mars">
    <button class="btn primary" style="width:100%;margin-top:10px" onclick="saveVehiculeForm('${id||''}')">${id?'Enregistrer':'Ajouter'}</button>`);

function saveVehiculeForm(id){
  const nom=val('v_nom'); if(!nom){ toast("Donne un nom au véhicule"); return; }
  const fields={nom, immat:(val('v_immat')||'').toUpperCase(), emoji:document.getElementById('v_emoji').value||'🚐', carburant:document.getElementById('v_carburant').value||'Diesel', note:val('v_note')};

function delVehicule(id){ if(!confirm("Supprimer ce véhicule ?")) return; if(useFB) refVehicule(id).remove(); else { delete VEHICULES[id]; lsSet('batisuivi_vehicules',VEHICULES); } render(); }
function assignVehicule(id){
  const v=VEHICULES[id];
  if(!v.assignes){ v.assignes={}; if(v.assigne){ v.assignes[v.assigne]=true; delete v.assigne; saveVehicule(id); } }

  openModal(`<div class="grabber"></div><h2 style="margin-bottom:6px">Assigner le véhicule</h2>
    <p class="note" style="margin-bottom:10px">Coche toutes les personnes qui utilisent ce véhicule.</p>
    ${members.length?members.map(u=>{const t=TEAM[u];const on=v.assignes&&v.assignes[u];return `<div class="member-row" onclick="toggleVehAssigne('${id}','${u}',this)" style="cursor:pointer">${avatarTag(t)}<div style="flex:1"><b>${esc(t.nom)}</b><div class="tag">${roleLabel(t.role)}</div></div><div class="checkbox ${on?'on':''}">${on?'✓':''}</div></div>`;}).join(''):`<p class="note">Aucun membre dans l'équipe pour l'instant.</p>`}
    <button class="btn primary" style="width:100%;margin-top:10px" onclick="closeModal();render()">Terminé</button>`);
}
function toggleVehAssigne(id,u,el){
  const v=VEHICULES[id]; if(!v.assignes)v.assignes={};
  if(v.assignes[u]) delete v.assignes[u]; else v.assignes[u]=true;
  saveVehicule(id);
  const cb=el&&el.querySelector?el.querySelector('.checkbox'):null;
  if(cb){ if(v.assignes[u]){cb.classList.add('on');cb.textContent='✓';}else{cb.classList.remove('on');cb.textContent='';} }
}
/* photos d'incident sur un véhicule (tout le monde peut en ajouter) */
function nbVehUnseen(id){ const v=VEHICULES[id]; if(!v||!v.photos) return 0; const seen=VEH_SEEN[id]||0; return Object.keys(v.photos).filter(k=>((v.photos[k].ts)||0)>seen).length; }
function markVehSeen(id){ VEH_SEEN[id]=Date.now(); lsSet('veh_seen',VEH_SEEN); pushSeen('veh',VEH_SEEN); }
function totalVehUnseen(){ let n=0; for(const id in VEHICULES){ n+=nbVehUnseen(id); } return n; }
function openVehIncidents(id){
  const v=VEHICULES[id]; if(!v) return;

function chatConvObj(convKey){

function chatUnreadKey(convKey){ const o=chatConvObj(convKey); const seen=CHAT_SEEN[convKey]||0; const me=myUid(); return Object.values(o).filter(m=>m&&m.from!==me&&(m.ts||0)>seen).length; }

let CHAT_REC=null, CHAT_REC_CHUNKS=[], CHAT_REC_TIMER=null, CHAT_REC_T0=0;
function chatToggleRec(){

  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{

    CHAT_REC=mr;
    mr.ondataavailable=e=>{ if(e.data&&e.data.size) CHAT_REC_CHUNKS.push(e.data); };
    mr.onstop=()=>{ stream.getTracks().forEach(t=>t.stop()); const type=(CHAT_REC_CHUNKS[0]&&CHAT_REC_CHUNKS[0].type)||'audio/webm'; const blob=new Blob(CHAT_REC_CHUNKS,{type}); const dur=Math.max(1,Math.round((Date.now()-CHAT_REC_T0)/1000)); CHAT_REC=null;
      if(blob.size>1600000){ toast("Vocal trop long. Reste sous ~1 min."); return; }
      const r=new FileReader(); r.onload=e=>{ chatSendMedia({audio:e.target.result, dur}); }; r.readAsDataURL(blob); };
    CHAT_REC_T0=Date.now(); mr.start();

}

function aiFn(){ return firebase.app().functions('europe-west1').httpsCallable('assistantBatiSuivi'); }
function saveAiMsg(id,msg){ const me=myUid(); if(!CHAT.ai)CHAT.ai={}; if(!CHAT.ai[me])CHAT.ai[me]={}; CHAT.ai[me][id]=msg; if(useFB) db().ref('batisuivi/chat/ai/'+me+'/'+id).set(msg); else lsSet('batisuivi_chat',CHAT); }

let DEVISIA={txt:'',busy:false,lignes:null,err:''};
function parseDevisJSON(s){
  let t=String(s||'').trim();
  t=t.replace(/```json/gi,'').replace(/```/g,'').trim();
  const a=t.indexOf('['), b=t.lastIndexOf(']');
  if(a<0||b<0||b<a) return null;
  let arr; try{ arr=JSON.parse(t.slice(a,b+1)); }catch(_){ return null; }
  if(!Array.isArray(arr)) return null;
  const out=arr.map(x=>({ label:String((x&&x.label)||'').trim(), qty:(parseFloat(x&&x.qty)||0), unit:String((x&&x.unit)||'').trim(), pu:(parseFloat(x&&x.pu)||0) })).filter(x=>x.label);
  return out.length?out:null;
}
function devisIAGen(){

function setFTab(t){ FTAB=t; render(); toTop(); }
function eurF(n){ return (n||0).toLocaleString('fr-FR',{maximumFractionDigits:0})+' €'; }
function eurF2(n){ return (n||0).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'; }
function factuAllDocs(){ const out=[]; Object.keys(CHANTIERS).forEach(id=>{ const c=CHANTIERS[id]; if(c.published) Object.keys(c.published).forEach(pid=>{ out.push({id,pid,nom:c.nom,...c.published[pid]}); }); }); return out.sort((a,b)=>(b.ts||0)-(a.ts||0)); }
function docTotal(d){ return (d.items||[]).reduce((s,it)=>s+it.qty*it.pu,0); }

function renderFactuApp(){
  const tabs=[['resume','chart','Résumé'],['devis','file','Devis'],['factures','receipt','Factures'],['clients','users','Clients'],['params','settings','Paramètres']];

  if(FTAB==='devis') body=factuDevis();
  else if(FTAB==='factures') body=factuFactures();

  <div class="page-head"><h2>${titles[FTAB]||'Facturation'}</h2></div>
  ${body}`;
}

function factuResume(){
  const all=Object.values(CHANTIERS).filter(c=>!c.archived);
  const docs=factuAllDocs();
  const facts=docs.filter(d=>d.type==='facture');
  const devs=docs.filter(d=>d.type!=='facture');
  const totFact=facts.reduce((s,d)=>s+docTotal(d),0);
  const devEnAttente=devs.filter(d=>!d.signature).length;
  const devSignes=devs.filter(d=>d.signature).length;
  const caPrev=Object.values(CHANTIERS).reduce((s,c)=>s+(((c.devis&&c.devis.items)||[]).reduce((x,it)=>x+it.qty*it.pu,0)),0);
  let h=`<div class="kpis">
    <div class="kpi ok"><div class="big">${eurF(totFact)}</div><div class="lbl">CA facturé (HT)</div></div>
    <div class="kpi acc"><div class="big">${facts.length}</div><div class="lbl">Factures émises</div></div>
    <div class="kpi"><div class="big">${devEnAttente}</div><div class="lbl">Devis en attente</div></div>
    <div class="kpi"><div class="big">${devSignes}</div><div class="lbl">Devis signés</div></div>
  </div>
  <div class="card"><div class="section-title" style="margin-top:0"><h2 style="font-size:15px">${icone('euro')} Chiffre d'affaires prévisionnel</h2></div>
    <div class="big" style="font-family:'Sora';font-size:32px;font-weight:800;color:var(--acc2)">${eurF(caPrev)}</div>
    <p class="note" style="margin-top:2px;font-size:11px">Total HT de tous les devis enregistrés. Estimation indicative, pas un montant comptable.</p>
  </div>`;
  h+=caChartCard(all,eurF);
  h+=ereportingCard(all);
  return h;
}

function factuDocRow(d){
  const tot=docTotal(d);
  const key=((d.num||'')+' '+(d.client||'')+' '+(d.nom||'')).toLowerCase();
  let status='';
  if(d.type==='facture'){ status = d.acompte?`<span class="pill">Acompte ${d.acompte===true?30:d.acompte}%</span>`:(d.solde?`<span class="pill">Solde</span>`:`<span class="pill">Émise</span>`); }
  else { status = d.signature?`<span class="pill" style="color:var(--ok)">${icone('check-circle')} Signé</span>`:(relanceDevis(d)?`<span class="pill relance">${icone('clock')} ${relanceDevis(d)} j</span>`:`<span class="pill">En attente</span>`); }
  return `<div class="member-row" data-q="${esc(key)}">
    <div style="flex:1;min-width:0"><b>${d.type==='facture'?'🧾':'📄'} ${esc(d.num||'')}</b>
      <div class="tag">${esc(d.nom||'')}${d.client?(' · '+esc(d.client)):''} · ${eurF(tot)} HT ${status}</div></div>
    <button class="iconbtn" title="Voir / imprimer" onclick="openDocWindow(CHANTIERS['${d.id}'].published['${d.pid}'])">${icone('eye')}</button>
    ${(d.type==='facture' && (CHANTIERS[d.id]||{}).clientType==='pro')?`<button class="iconbtn" title="Télécharger le Factur-X" onclick="facturXPdf('${d.id}','${d.pid}')">${icone('download')}</button>`:''}
    <button class="iconbtn danger" title="Supprimer" onclick="delFactuDoc('${d.id}','${d.pid}')">${icone('trash')}</button>
  </div>`;
}
function factuFilter(kind){ const inp=document.getElementById('fq_'+kind); const ql=((inp&&inp.value)||'').toLowerCase().trim(); const list=document.getElementById('list_'+kind); if(!list) return; Array.from(list.children).forEach(el=>{ const k=el.getAttribute('data-q')||''; el.style.display=(!ql||k.indexOf(ql)>=0)?'':'none'; }); }
function delFactuDoc(id,pid){ if(!confirm("Supprimer ce document ? Il sera aussi retiré de l'espace client.")) return; unpublishDoc(id,pid); }

function factuDevis(){
  const devs=factuAllDocs().filter(d=>d.type!=='facture');
  const sub=FDEVIS_SUB;
  const now=devs.filter(docEnCours);
  const past=devs.filter(d=>d.signature);
  let h=`<div class="card"><div class="section-title" style="margin-top:0"><h2 style="font-size:15px">${icone('file')} Devis</h2></div>
    <div class="row" style="gap:6px"><button class="btn ${sub==='now'?'primary':'ghost'}" style="flex:1" onclick="setFDevisSub('now')">En ce moment</button><button class="btn ${sub==='past'?'primary':'ghost'}" style="flex:1" onclick="setFDevisSub('past')">Passés</button></div>`;
  if(sub==='now'){
    if(!now.length) h+=`<p class="note" style="margin-top:10px">Aucun devis en cours. Ouvre un chantier, ajoute des lignes, puis « Publier le devis ».</p>`;
    else h+=`<div style="margin-top:10px">`+now.map(factuDocRow).join('')+`</div>`;
  } else {
    if(!past.length) h+=`<p class="note" style="margin-top:10px">Aucun devis signé pour l'instant.</p>`;
    else h+=`<div style="margin-top:10px">`+groupByMonthHTML(past)+`</div>`;
  }
  h+=`</div>`;
  return h;
}
function factuFactures(){
  const facts=factuAllDocs().filter(d=>d.type==='facture');
  const type=FFACT_TYPE, sub=FFACT_SUB;
  const isPro=d=>((CHANTIERS[d.id]||{}).clientType==='pro');
  const byType=facts.filter(d=> type==='pro'? isPro(d) : !isPro(d));
  const rows = sub==='now' ? byType.filter(docEnCours) : byType.filter(d=>!docEnCours(d));
  let h=`<div class="card"><div class="section-title" style="margin-top:0"><h2 style="font-size:15px">${icone('receipt')} Factures</h2></div>
    <div class="row" style="gap:6px"><button class="btn ${type==='pro'?'primary':'ghost'}" style="flex:1" onclick="setFFactType('pro')">Pros</button><button class="btn ${type==='part'?'primary':'ghost'}" style="flex:1" onclick="setFFactType('part')">Particuliers</button></div>
    <div class="row" style="gap:6px;margin-top:8px"><button class="btn ${sub==='now'?'primary':'ghost'}" style="flex:1" onclick="setFFactSub('now')">En ce moment</button><button class="btn ${sub==='past'?'primary':'ghost'}" style="flex:1" onclick="setFFactSub('past')">Passées</button></div>`;
  if(!rows.length) h+=`<p class="note" style="margin-top:10px">Aucune facture ${sub==='now'?'en cours':'passée'} pour ce type de client.</p>`;
  else if(sub==='now') h+=`<div style="margin-top:10px">`+rows.map(factuDocRow).join('')+`</div>`;
  else h+=`<div style="margin-top:10px">`+groupByMonthHTML(rows)+`</div>`;
  if(type==='pro') h+=`<p class="note" style="margin-top:8px;font-size:11px">${icone('download')} = facture électronique Factur-X (clients pros).</p>`;
  h+=`</div>`;
  return h;
}
function factuClients(){
  const map={};
  Object.values(CHANTIERS).forEach(c=>{
    const pro=c.clientType==='pro';
    const name=pro?((c.clientSociete||'').trim()||clientFull(c)):clientFull(c);
    if(!name||name==='—') return;
    const key=(pro?'pro:':'part:')+name.toLowerCase();
    if(!map[key]) map[key]={name,pro,siren:c.clientSiren||'',tel:c.clientTel||'',email:c.clientEmail||'',adresse:adresseFull(c),nb:0,fact:0};
    map[key].nb++;
    if(!map[key].tel&&c.clientTel)map[key].tel=c.clientTel;
    if(!map[key].email&&c.clientEmail)map[key].email=c.clientEmail;
    if(!map[key].siren&&c.clientSiren)map[key].siren=c.clientSiren;
    if(c.published) Object.values(c.published).forEach(d=>{ if(d.type==='facture') map[key].fact+=docTotal(d); });
  });
  const clients=Object.values(map).sort((a,b)=>b.fact-a.fact);
  let h=`<div class="card"><div class="section-title" style="margin-top:0"><h2 style="font-size:15px">${icone('users')} Clients (${clients.length})</h2></div>`;
  if(!clients.length){ h+=`<p class="note">Aucun client pour l'instant. Les clients apparaissent ici dès que tu crées des chantiers.</p>`; }
  else clients.forEach(cl=>{ h+=`<div class="member-row">

/* ===== Vue « Échéances & retards » (hub Planning) : chantiers en retard puis à échéance sous 7 jours ===== */
function viewEcheances(){
  const today=todayISO();
  const dday=iso=>Math.round((new Date(iso+'T00:00:00')-new Date(today+'T00:00:00'))/86400000);
  const all=Object.keys(CHANTIERS).map(id=>({id,c:CHANTIERS[id]})).filter(x=>!x.c.archived);
  const retards=all.filter(x=>isLate(x.c)).sort((a,b)=>String(a.c.dateFin).localeCompare(String(b.c.dateFin)));
  const fin=ETAPES[ETAPES.length-1];
  const echeances=all.filter(x=>x.c.dateFin && !isLate(x.c) && x.c.etape!==fin && x.c.dateFin>=today && dday(x.c.dateFin)<=7)
                     .sort((a,b)=>String(a.c.dateFin).localeCompare(String(b.c.dateFin)));
  const row=(id,c,tag,col)=>`<div class="task-row" onclick="openChantier('${id}')" style="cursor:pointer">
    <div style="flex:1;min-width:0"><b>${esc(c.nom)}</b><div class="tag">${esc(clientFull(c))} · fin le ${frDate(c.dateFin)}</div></div>
    <span class="tag" style="flex:none;color:${col}">${tag}</span></div>`;
  let h=`<div class="card"><div class="section-title" style="margin-top:0"><h2 style="font-size:15px">${icone('alert')} En retard${retards.length?` <span class="tag">${retards.length}</span>`:''}</h2></div>`;
  if(!retards.length) h+=`<p class="note" style="margin:0">Aucun chantier en retard. 👍</p>`;
  else retards.forEach(x=>{ const j=-dday(x.c.dateFin); h+=row(x.id,x.c,`en retard de ${j} j`,'var(--danger)'); });
  h+=`</div>`;
  h+=`<div class="card"><div class="section-title" style="margin-top:0"><h2 style="font-size:15px">${icone('clock')} À échéance sous 7 jours${echeances.length?` <span class="tag">${echeances.length}</span>`:''}</h2></div>`;
  if(!echeances.length) h+=`<p class="note" style="margin:0">Aucune échéance dans les 7 prochains jours.</p>`;
  else echeances.forEach(x=>{ const j=dday(x.c.dateFin); h+=row(x.id,x.c,j===0?'aujourd’hui':`dans ${j} j`,'var(--warn)'); });
  h+=`</div>`;
  return h;
}

function viewRdvClients(){

  const all=Object.keys(CHANTIERS).map(id=>({id,c:CHANTIERS[id]})).filter(x=>!x.c.archived && x.c.dateRdv);

function caChartCard(all,eur){

}
/* ---- e-reporting : récap HT + TVA par mois (préparation déclaration) ---- */
function moisLong(m){ return ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'][m]||''; }
/* ---- TVA paramétrable : taux défini par le patron dans les réglages facturation. 0 = franchise en base (art. 293 B CGI, pas de TVA). ---- */
function tvaRate(){ var r=(typeof CONFIG_DB!=='undefined')?CONFIG_DB.tvaRate:null; if(r===''||r===null||r===undefined) return 20; r=Number(r); return (isNaN(r)||r<0)?20:r; }
function tvaFactor(){ return tvaRate()/100; }
function isFranchiseTva(){ return tvaRate()===0; }
function tvaPct(){ var r=tvaRate(); return (Math.round(r*100)/100).toString().replace('.',','); }
function tvaLabel(){ return isFranchiseTva()?'TVA non applicable':('TVA '+tvaPct()+'%'); }
function tvaMention(){ return 'TVA non applicable, art. 293 B du CGI'; }
function fxCat(){ return isFranchiseTva()?'E':'S'; }
function fxRate(){ return tvaRate().toFixed(2); }
function ereportingRows(all){
  const map={};
  all.forEach(c=>{ const pub=c.published?Object.values(c.published):[];
    pub.filter(d=>d.type==='facture').forEach(d=>{ const dt=new Date(d.ts||0); const y=dt.getFullYear(), m=dt.getMonth(); const key=y+'-'+String(m+1).padStart(2,'0');
      const ht=(d.items||[]).reduce((s,it)=>s+it.qty*it.pu,0);
      if(!map[key]) map[key]={key,y,m,ht:0,n:0}; map[key].ht+=ht; map[key].n++; });
  });
  const f=tvaFactor(); return Object.values(map).map(r=>({...r,tva:r.ht*f,ttc:r.ht*(1+f)})).sort((a,b)=>a.key<b.key?1:-1);
}

let _pdfLibLoading=null;
function loadPdfLib(){

    const blob=new Blob([bytes],{type:'application/pdf'}); const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download='factur-x_test_'+destKey+'_'+inv.num+'.pdf';
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    toast("Factur-X de test telecharge ✅ — depose-le dans le portail");
  }catch(e){ toast("Souci a la generation : "+((e&&e.message)||'')); }
}

let _pendingNote=null;
function addNoteFrais(){
  const inp=document.getElementById('photoFile'); inp.value='';
  inp.onchange=()=>{ const f=inp.files&&inp.files[0]; if(!f) return;
    const r=new FileReader(); r.onload=e=>{ const img=new Image(); img.onload=()=>{
      const cv=document.createElement('canvas'); const S=1100; let w=img.width,hh=img.height;
      if(w>hh){ if(w>S){hh=hh*S/w;w=S;} } else { if(hh>S){w=w*S/hh;hh=S;} }

  const down=e=>{ const p=pt(e); _crop.drag={px:p.x,py:p.y,ox:_crop.x,oy:_crop.y}; };
  const move=e=>{ if(!_crop.drag) return; const p=pt(e); _crop.x=_crop.drag.ox+(p.x-_crop.drag.px); _crop.y=_crop.drag.oy+(p.y-_crop.drag.py); applyCropTransform(); if(e.cancelable)e.preventDefault(); };

function saveLigne(id){
  const desc=val('dl_desc'); const qty=parseFloat(document.getElementById('dl_qty').value)||0; const pu=parseFloat(document.getElementById('dl_pu').value)||0;
  if(!desc){ toast('Mets une description'); return; }
  const c=CHANTIERS[id]; if(!c.devis)c.devis={items:[]}; if(!c.devis.items)c.devis.items=[];
  c.devis.items.push({desc,qty,pu}); saveChantier(id); closeModal(); render();
}
function delLigne(id,i){ CHANTIERS[id].devis.items.splice(i,1); saveChantier(id); render(); }
function docSnapshot(id,type){
  const c=CHANTIERS[id]; const dv=c.devis||{items:[]};

function crToggleMic(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return;
  if(CR_STATE.listening){ crStopMic(); return; }
  const rec = new SR();
  rec.lang='fr-FR'; rec.continuous=true; rec.interimResults=true;
  const raw=document.getElementById('cr_raw');
  CR_STATE.finalText = raw ? raw.value : '';
  rec.onresult = (e)=>{
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t=e.results[i][0].transcript;
      if(e.results[i].isFinal){ CR_STATE.finalText += (CR_STATE.finalText?' ':'')+t.trim(); }
      else interim += t;
    }
    if(raw) raw.value = (CR_STATE.finalText + (interim?(' '+interim):'')).trim();
  };
  rec.onerror = (e)=>{ const s=document.getElementById('cr_status'); if(s) s.textContent = e.error==='not-allowed' ? "Micro refusé : autorise le micro dans ton navigateur." : "Souci micro : "+e.error; crStopMic(); };
  rec.onend = ()=>{ if(CR_STATE.listening){ try{rec.start();}catch(_){} } }; // relance si on n'a pas stoppé volontairement
  CR_STATE.rec = rec; CR_STATE.listening = true;
  try{ rec.start(); }catch(_){}
  const b=document.getElementById('cr_mic'); if(b){ b.textContent='⏹️ Arrêter la dictée'; b.classList.add('danger'); }
  const s=document.getElementById('cr_status'); if(s) s.textContent='🔴 En écoute… parle, puis appuie sur Arrêter.';
}

function crStopMic(){
  CR_STATE.listening=false;
  if(CR_STATE.rec){ try{ CR_STATE.rec.stop(); }catch(_){} CR_STATE.rec=null; }
  const b=document.getElementById('cr_mic'); if(b){ b.textContent='🎤 Démarrer la dictée'; b.classList.remove('danger'); }
  const s=document.getElementById('cr_status'); if(s) s.textContent='Dictée en pause. Tu peux corriger le texte puis le structurer.';
}

function crStructurer(id){
  crStopMic();
  const raw=document.getElementById('cr_raw'); const texte=raw?raw.value.trim():'';
  if(!texte){ toast("Dicte ou écris d'abord ton compte-rendu."); return; }
  if(useFB && !(firebase.auth().currentUser)){ toast("Connecte-toi pour utiliser l'IA."); return; }
  const btn=document.getElementById('cr_struct');
  if(btn){ btn.disabled=true; btn.textContent='⏳ Structuration en cours…'; }
  crFn()({ texte }).then(res=>{
    const d=res.data||{};
    const set=(elId,v)=>{ const e=document.getElementById(elId); if(e) e.value = (typeof v==='string'?v:''); };
    set('cr_taches', d.taches_realisees);

function _openPdfDataUrl(dataUrl, filename){
  try{
    const b64=String(dataUrl).split(',').pop(); const bin=atob(b64); const len=bin.length; const arr=new Uint8Array(len);
    for(let i=0;i<len;i++) arr[i]=bin.charCodeAt(i);
    const blob=new Blob([arr],{type:'application/pdf'}); const url=URL.createObjectURL(blob);
    const w=window.open(url,'_blank');
    if(!w){ const a=document.createElement('a'); a.href=url; a.download=filename||'document.pdf'; document.body.appendChild(a); a.click(); a.remove(); }
    setTimeout(function(){ try{ URL.revokeObjectURL(url); }catch(_){ } }, 60000);
  }catch(e){ toast("Impossible d'ouvrir le document"); }
}

  if(mode==='acompte'){ p=pct||30; factItems=[{desc:`Acompte ${p}% sur devis`,qty:1,pu:Math.round(total*p/100*100)/100}]; }
  else factItems=items.slice();
  if(!c.published) c.published={};
  const snap=docSnapshot(id,'facture'); snap.items=factItems; snap.num=nextFactureNum(); snap.ts=Date.now(); if(mode==='acompte') snap.acompte=p;
  const pid=uid(); c.published[pid]=snap; saveChantier(id); render();
  toast(mode==='acompte'?`Acompte de ${p}% publié ✅`:"Facture publiée ✅");
}
function publishFactureAcompte(id){
  const c=CHANTIERS[id]; const items=(c.devis&&c.devis.items)||[]; if(!items.length){ toast("Ajoute des lignes d'abord"); return; }
  openPrompt("Pourcentage de l'acompte","ex : 30, 50, 70…",v=>{ let p=parseInt((v||'').replace(/[^0-9]/g,''),10); if(!p||p<1)p=30; if(p>100)p=100; publishFacture(id,'acompte',p); });
  setTimeout(()=>{const e=document.getElementById('pr_in'); if(e){ e.value='30'; e.setAttribute('inputmode','numeric'); try{e.select();}catch(_){ } }},70);
}
function factureTotal(d){ return ((d&&d.items)||[]).reduce((s,it)=>s+it.qty*it.pu,0); }
function resteAPayer(c){
  const total=((c.devis&&c.devis.items)||[]).reduce((s,it)=>s+it.qty*it.pu,0);
  let paye=0; if(c.published) Object.values(c.published).forEach(d=>{ if(d.type==='facture') paye+=factureTotal(d); });
  return { total, paye:Math.round(paye*100)/100, reste:Math.max(0,Math.round((total-paye)*100)/100) };
}
function publishFactureSolde(id){
  const c=CHANTIERS[id]; const r=resteAPayer(c);
  if(r.total<=0){ toast("Ajoute des lignes d'abord"); return; }
  if(r.reste<=0){ toast("Ce chantier est déjà soldé ✅"); return; }
  if(!c.published) c.published={};
  const snap=docSnapshot(id,'facture'); snap.items=[{desc:'Solde du devis',qty:1,pu:r.reste}]; snap.num=nextFactureNum(); snap.ts=Date.now(); snap.solde=true;

/* ---- signature client (bon pour accord) ---- */
let _sigCtx=null,_sigDrawing=false,_sigHas=false,_sigPid=null;
function clientSignDoc(pid){
  _sigPid=pid; _sigHas=false;
  openModal(`<div class="grabber"></div><h2 style="margin-bottom:4px">Signature — bon pour accord</h2>
    <p class="note" style="margin-bottom:10px">Signe avec ton doigt dans le cadre ci-dessous, puis valide.</p>
    <canvas id="sigPad" style="width:100%;height:200px;background:#fff;border:1px solid var(--line);border-radius:12px;touch-action:none;display:block"></canvas>
    <div class="row" style="margin-top:12px"><button class="btn ghost" onclick="sigClear()">Effacer</button>
      <button class="btn primary" onclick="sigSave()">Valider ma signature</button></div>`);
  setTimeout(initSigPad,80);
}
function initSigPad(){
  const cv=document.getElementById('sigPad'); if(!cv) return;
  let rect; try{ rect=cv.getBoundingClientRect(); }catch(_){ rect={width:300,height:200}; }
  cv.width=(rect.width||300)*2; cv.height=(rect.height||200)*2;
  const ctx=cv.getContext('2d'); ctx.scale(2,2); ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle='#0e1525'; _sigCtx=ctx;
  const pos=e=>{ const r=cv.getBoundingClientRect(); const t=e.touches?e.touches[0]:e; return {x:t.clientX-r.left,y:t.clientY-r.top}; };
  const start=e=>{ _sigDrawing=true; const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); if(e.cancelable)e.preventDefault(); };
  const move=e=>{ if(!_sigDrawing)return; const p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); _sigHas=true; if(e.cancelable)e.preventDefault(); };
  const end=()=>{ _sigDrawing=false; };
  cv.ontouchstart=start; cv.ontouchmove=move; cv.ontouchend=end;
  cv.onmousedown=start; cv.onmousemove=move; cv.onmouseup=end; cv.onmouseleave=end;
}
function sigClear(){ const cv=document.getElementById('sigPad'); if(cv&&_sigCtx){ _sigCtx.clearRect(0,0,cv.width,cv.height); _sigHas=false; } }
function sigSave(){
  if(!_sigHas){ toast("Signe d'abord dans le cadre"); return; }
  const cv=document.getElementById('sigPad'); const url=cv.toDataURL('image/png');
  const ch=CHANTIERS[CLIENT.chantierId]; const d=ch&&ch.published&&ch.published[_sigPid]; if(!d) return;
  d.signature=url; d.signedAt=new Date().toISOString(); d.signedBy=CLIENT.nom;
  clientPersist('signDoc',{pid:_sigPid, signature:url}); closeModal(); toast("Devis signé ✅ Merci !"); render();
}

/* ============== MODULE RÉCEPTION & RÉSERVES + GARANTIES ============== */
function addYears(iso,n){ const d=new Date(iso+'T00:00:00'); if(isNaN(d)) return null; d.setFullYear(d.getFullYear()+n); return d; }
function frDateFR(iso){ if(!iso) return '—'; const d=new Date(iso+'T00:00:00'); if(isNaN(d)) return esc(iso); return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function garantieDates(dateISO){
  const mk=(n)=>{ const e=addYears(dateISO,n); if(!e) return '—'; const exp=(e-new Date())<=0; return (exp?'Expirée le ':"Jusqu'au ")+e.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'}); };
  return { gpaTxt:mk(1), bieTxt:mk(2), decTxt:mk(10) };
}
function chantierHT(c){ let ht=0; if(c.published){ Object.values(c.published).forEach(d=>{ if(d.type==='facture') ht+=(d.items||[]).reduce((s,it)=>s+it.qty*it.pu,0); }); } if(!ht && c.devis && c.devis.items){ ht=c.devis.items.reduce((s,it)=>s+it.qty*it.pu,0); } return ht; }

/* ===== Compression image partagée (900px) ===== */
function compresse900(file,cb){ if(!file) return; const r=new FileReader(); r.onload=e=>{ const img=new Image(); img.onload=()=>{ const cv=document.createElement('canvas'); const S=900; let w=img.width,hh=img.height; if(w>hh){ if(w>S){hh=hh*S/w;w=S;} } else { if(hh>S){w=w*S/hh;hh=S;} } cv.width=w;cv.height=hh; cv.getContext('2d').drawImage(img,0,0,w,hh); cb(cv.toDataURL('image/jpeg',0.7)); }; img.src=e.target.result; }; r.readAsDataURL(file); }

function rentabiliteCard(id,c){
  const head=`<div class="section-title" style="margin-top:0"><h2 style="font-size:15px"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg> Rentabilité</h2></div>`;

  return `<div class="card">${head}

/* ===== Clôture du chantier : check-list de fin, archivage + récap PDF ===== */
function clotureEtats(c){
  const recu=!!(c.reception&&c.reception.done);
  const reserves=(c.reception&&c.reception.reserves)?Object.values(c.reception.reserves):[];
  const reservesOK=reserves.every(x=>x.statut==='done');
  const factureOK=!!(c.published&&Object.values(c.published).some(d=>d&&d.type==='facture'));
  return {recu,reserves,reservesOK,factureOK};
}
function clotureCard(id,c){

  const reservesLabel=e.reserves.length?`Réserves levées (${e.reserves.filter(x=>x.statut==='done').length}/${e.reserves.length})`:'Réserves levées';
  const reservesAttente=e.reserves.length?'en attente':'aucune réserve';
  const reservesOkDisp=e.reserves.length?e.reservesOK:true;
  let h=`<div class="card">
    <div class="section-title" style="margin-top:0"><h2 style="font-size:15px"><svg class="lic" viewBox="0 0 24 24" width="1.05em" height="1.05em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg> Clôture du chantier</h2></div>
    <p class="note" style="margin:0 0 10px">Vérifie que tout est en ordre avant de clôturer. La clôture archive le chantier et génère un récap PDF.</p>
    ${row(e.recu,'Réception prononcée','en attente')}
    ${row(reservesOkDisp,reservesLabel,reservesAttente)}
    ${row(e.factureOK,'Au moins une facture publiée','en attente')}
    <button class="btn primary" style="width:100%;margin-top:10px" onclick="cloturerChantier('${id}')">Clôturer le chantier</button>
  </div>`;
  return h;

function clotureFactureHT(c){ let ht=0; if(c.published){ Object.values(c.published).forEach(d=>{ if(d&&d.type==='facture') ht+=(d.items||[]).reduce((s,it)=>s+it.qty*it.pu,0); }); } return ht; }
async function cloturerChantier(id){
  const c=CHANTIERS[id]; if(!c) return;
  const e=clotureEtats(c);
  const manque=[];
  if(!e.recu) manque.push("réception non prononcée");
  if(e.reserves.length && !e.reservesOK) manque.push("des réserves ne sont pas levées");
  if(!e.factureOK) manque.push("aucune facture publiée");
  const msg=manque.length? ("Attention : "+manque.join(", ")+".\n\nClôturer quand même ? Le chantier sera archivé.") : "Clôturer et archiver ce chantier ?";
  if(!confirm(msg)) return;
  const ok=await clotureRecapPDF(id);
